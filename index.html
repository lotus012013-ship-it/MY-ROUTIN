function _initRoutineDrag() {
  const list = document.getElementById('manage-list');
  let dragSrc = null, touchDragEl = null, touchClone = null, touchStartY = 0;

  list.querySelectorAll('.routine-manage-card').forEach(card => {
    const handle = card.querySelector('.drag-handle');
    if (!handle) return;

    // Desktop drag
    handle.addEventListener('mousedown', () => { card.draggable = true; });
    card.addEventListener('dragstart', e => {
      dragSrc = card;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.draggable = false;
      card.classList.remove('dragging');
      list.querySelectorAll('.routine-manage-card').forEach(c => c.classList.remove('drag-over'));
      _saveRoutineOrder();
    });
    card.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
    card.addEventListener('dragenter', e => { e.preventDefault(); if (card !== dragSrc) card.classList.add('drag-over'); });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', e => {
      e.preventDefault();
      if (dragSrc && dragSrc !== card) {
        const cards = [...list.querySelectorAll('.routine-manage-card')];
        const si = cards.indexOf(dragSrc), ti = cards.indexOf(card);
        if (si < ti) card.after(dragSrc); else card.before(dragSrc);
      }
      card.classList.remove('drag-over');
    });

    // Touch drag
    handle.addEventListener('touchstart', e => {
      const touch = e.touches[0];
      touchDragEl = card;
      touchStartY = touch.clientY;
      touchClone = card.cloneNode(true);
      touchClone.style.cssText = `position:fixed;left:${card.getBoundingClientRect().left}px;top:${card.getBoundingClientRect().top}px;width:${card.offsetWidth}px;opacity:0.85;z-index:999;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,0.4);`;
      document.body.appendChild(touchClone);
      card.classList.add('dragging');
    }, {passive: true});

    handle.addEventListener('touchmove', e => {
      if (!touchDragEl) return;
      e.preventDefault();
      const touch = e.touches[0];
      const dy = touch.clientY - touchStartY;
      touchClone.style.top = (touchDragEl.getBoundingClientRect().top + dy) + 'px';
      const target = document.elementFromPoint(touch.clientX, touch.clientY)?.closest('.routine-manage-card');
      list.querySelectorAll('.routine-manage-card').forEach(c => c.classList.remove('drag-over'));
      if (target && target !== touchDragEl) target.classList.add('drag-over');
    }, {passive: false});

    handle.addEventListener('touchend', e => {
      if (!touchDragEl) return;
      const touch = e.changedTouches[0];
      const target = document.elementFromPoint(touch.clientX, touch.clientY)?.closest('.routine-manage-card');
      if (target && target !== touchDragEl) {
        const cards = [...list.querySelectorAll('.routine-manage-card')];
        const si = cards.indexOf(touchDragEl), ti = cards.indexOf(target);
        if (si < ti) target.after(touchDragEl); else target.before(touchDragEl);
      }
      touchDragEl.classList.remove('dragging');
      list.querySelectorAll('.routine-manage-card').forEach(c => c.classList.remove('drag-over'));
      touchClone.remove();
      touchDragEl = null; touchClone = null;
      _saveRoutineOrder();
    });
  });
}

function _saveRoutineOrder() {
  const ids = [...document.querySelectorAll('#manage-list .routine-manage-card')].map(el => el.dataset.id);
  state.routines.sort((a, b) => ids.indexOf(a.id) - ids.indexOf(b.id));

  renderToday();
}

    if (!handle) return;
    handle.addEventListener('mousedown', () => { card.draggable = true; });
    card.addEventListener('dragstart', e => { dragSrc = card; card.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
    card.addEventListener('dragend', () => { card.draggable = false; card.classList.remove('dragging'); list.querySelectorAll('.challenge-manage-card').forEach(c => c.classList.remove('drag-over')); _saveChallengeOrder(); });
    card.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
    card.addEventListener('dragenter', e => { e.preventDefault(); if (card !== dragSrc) card.classList.add('drag-over'); });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', e => {
      e.preventDefault();
      if (dragSrc && dragSrc !== card) {
        const cards = [...list.querySelectorAll('.challenge-manage-card')];
        const si = cards.indexOf(dragSrc), ti = cards.indexOf(card);
        if (si < ti) card.after(dragSrc); else card.before(dragSrc);
      }
      card.classList.remove('drag-over');
    });
    handle.addEventListener('touchstart', e => {
      const touch = e.touches[0];
      touchDragEl = card; touchStartY = touch.clientY; touchClone = card.cloneNode(true);
      touchClone.style.cssText = `position:fixed;left:${card.getBoundingClientRect().left}px;top:${card.getBoundingClientRect().top}px;width:${card.offsetWidth}px;opacity:0.85;z-index:999;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,0.4);`;
      document.body.appendChild(touchClone); card.classList.add('dragging');
    }, {passive: true});
    handle.addEventListener('touchmove', e => {
      if (!touchDragEl) return; e.preventDefault();
      const touch = e.touches[0], dy = touch.clientY - touchStartY;
      touchClone.style.top = (touchDragEl.getBoundingClientRect().top + dy) + 'px';
      const target = document.elementFromPoint(touch.clientX, touch.clientY)?.closest('.challenge-manage-card');
      list.querySelectorAll('.challenge-manage-card').forEach(c => c.classList.remove('drag-over'));
      if (target && target !== touchDragEl) target.classList.add('drag-over');
    }, {passive: false});
    handle.addEventListener('touchend', e => {
      if (!touchDragEl) return;
      const touch = e.changedTouches[0];
      const target = document.elementFromPoint(touch.clientX, touch.clientY)?.closest('.challenge-manage-card');
      if (target && target !== touchDragEl) {
        const cards = [...list.querySelectorAll('.challenge-manage-card')];
        const si = cards.indexOf(touchDragEl), ti = cards.indexOf(target);
        if (si < ti) target.after(touchDragEl); else target.before(touchDragEl);
      }
      touchDragEl.classList.remove('dragging'); list.querySelectorAll('.challenge-manage-card').forEach(c => c.classList.remove('drag-over'));
      touchClone.remove(); touchDragEl = null; touchClone = null; _saveChallengeOrder();
    });
  });
}

function getFailBucket(type, date, create=false) {

// ── HISTORY CALENDAR ─────────────────────────────
let _historyCtx = null;
function openHistoryModal(type, id, name) {
  _historyCtx = {type, id, name};
  document.getElementById('history-modal-title').textContent = name;
  _renderHistoryCal();
  openModal('history-modal');
}
function _renderHistoryCal() {
  const {type, id} = _historyCtx;
  const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const DAY_LABELS = ['일','월','화','수','목','금','토'];
  const todayStr = today();
  const [ty,tm] = todayStr.split('-').map(Number);
  let html = '';
  for (let mo = 2; mo >= 0; mo--) {
    let y = ty, m = tm - mo;
    if (m <= 0) { m += 12; y--; }
    const firstDay = new Date(y, m-1, 1).getDay();
    const daysInMonth = new Date(y, m, 0).getDate();
    html += `<div class="history-month-label">${y}년 ${MN[m-1]}</div>`;
    html += `<div class="history-cal-grid">`;
    html += DAY_LABELS.map(d=>`<div class="history-cal-label">${d}</div>`).join('');
    for (let i=0; i<firstDay; i++) html += `<div class="history-cal-day empty"></div>`;
    for (let d=1; d<=daysInMonth; d++) {
      const ds = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isFuture = ds > todayStr;
      const isDone = type==='routine' ? !!(state.logs[ds]?.[id]) : !!(state.challengeLogs[id]?.[ds]);
      const isToday = ds === todayStr;
      let cls = 'history-cal-day';
      if (isDone) cls += ' done';
      if (isToday) cls += ' today-mark';
      if (isFuture) cls += ' empty';
      const click = (!isFuture && type==='routine') ? `onclick="toggleHistoryDay('${ds}')"` : '';
      const style = (!isFuture && type==='routine') ? 'style="cursor:pointer"' : '';
      html += `<div class="${cls}" ${click} ${style}>${isFuture?'':d}</div>`;
    }
    html += `</div>`;
  }
  const totalDone = type==='routine'
    ? Object.values(state.logs).filter(log=>log[id]).length
    : Object.values(state.challengeLogs[id]||{}).filter(Boolean).length;
  document.getElementById('history-modal-sub').textContent = `총 ${totalDone}회 완료`;
  document.getElementById('history-cal-body').innerHTML = html;
}
function toggleHistoryDay(ds) {
  const {id} = _historyCtx;
  if (!state.logs[ds]) state.logs[ds] = {};
  const wasDone = !!state.logs[ds][id];
  state.logs[ds][id] = !wasDone;
  if (!state.logs[ds][id]) {
    delete state.logs[ds][id];
    // failLog도 함께 제거
    if (state.failLogs[ds]) {
      delete state.failLogs[ds][id];
      if (!Object.keys(state.failLogs[ds]).length) delete state.failLogs[ds];
    }
  }
  // 해당 날 완료 루틴이 하나도 없으면 빈 객체 정리
  if (!Object.keys(state.logs[ds]).length) delete state.logs[ds];
  save();
  _renderHistoryCal();
  if (ds === today()) renderToday();
}

function togglePastRoutine(routineId, dateStr) {

  openDayDetail(dateStr);

function togglePastChallenge(challengeId, dateStr) {
  const c=state.challenges.find(x=>x.id===challengeId);
  if(!c)return;
  if(!state.challengeLogs[challengeId]) state.challengeLogs[challengeId]={};
  const wasDone=!!state.challengeLogs[challengeId][dateStr];
  if(!wasDone&&getFailReason('challenge',challengeId,dateStr)){showToast('📝 못한 이유를 먼저 지워주세요');return;}
  state.challengeLogs[challengeId][dateStr]=!wasDone;
  if(wasDone&&state.challengeMemos[challengeId]) delete state.challengeMemos[challengeId][dateStr];
  const prev=state.character.stats[getChallengeCategory(c)]||0;
  recalcStats();
  if(!wasDone) maybeAwardChallengeXP(c);
  if(!wasDone&&dateStr===today()) checkRankUp(getChallengeCategory(c), prev, state.character.stats[getChallengeCategory(c)]||0);
  checkTitleUnlock();
  save();
  openDayDetail(dateStr);
  if(dateStr===today()) renderToday();
  renderChallenge();renderChar();renderCalendar();renderMonthReport();renderBreakdown();
}

function openDayDetail(dateStr) {
  const d = new Date(dateStr+'T00:00:00');

  document.getElementById('day-detail-title').textContent =
    `${d.getMonth()+1}월 ${d.getDate()}일 ${days[d.getDay()]}요일`;

  const log = state.logs[dateStr] || {};
  const fl  = state.failLogs[dateStr] || {};
  const ar  = state.routines.filter(r => r.active !== false);
  const isToday = dateStr === today();

  const routineHtml = ar.map(r => {
    const done = log[r.id];
    const fr = fl[r.id] ? FAIL_REASONS.find(x => x.id === fl[r.id]) : null;
    return `<div class="day-detail-row ${done?'done':''}">
      <div class="check-circle" style="width:22px;height:22px;font-size:12px;flex-shrink:0;cursor:pointer" onclick="togglePastRoutine('${r.id}','${dateStr}')">${done?'✓':''}</div>

        ${fr?`<div class="fail-tag">${fr.emoji} ${fr.label}</div>`:''}
      </div>
      ${!done?`<button class="fail-btn" onclick="openFailModal('${r.id}',null,'${dateStr}')">📝</button>`:''}
    </div>`;
  }).join('');
  const challengeRows=activeChallengesForDate(dateStr);
  const challengeHtml=challengeRows.map(c=>{
    const done=challengeDoneOnDate(c,dateStr);
    const failReason=getFailReason('challenge',c.id,dateStr);
    const fr=failReason?FAIL_REASONS.find(x=>x.id===failReason):null;
    return `<div class="day-detail-row ${done?'done':''}">
      <div class="check-circle" style="width:22px;height:22px;font-size:12px;flex-shrink:0;cursor:pointer" onclick="togglePastChallenge('${c.id}','${dateStr}')">${done?'✓':''}</div>
      <div style="flex:1;min-width:0;cursor:pointer" onclick="togglePastChallenge('${c.id}','${dateStr}')">
        <div style="font-size:14px;${done?'text-decoration:line-through;color:var(--text-dim)':''}">${catIcon(getChallengeCategory(c))} ${c.name}</div>

        ${fr?`<div class="fail-tag">${fr.emoji} ${fr.label}</div>`:''}
      </div>
      ${!done?`<button class="fail-btn" onclick="openFailModal('${c.id}',event,'${dateStr}','challenge')">📝</button>`:''}
    </div>`;
  }).join('');
  const html=[routineHtml,challengeHtml].filter(Boolean).join(challengeHtml&&routineHtml?'<div style="height:8px"></div>':'');

  document.getElementById('day-detail-list').innerHTML = html || '<div class="empty-state">기록할 항목이 없어요</div>';
  openModal('day-detail-modal');

  {days:21,label:'3주일'}, {days:30,label:'1개월'}, {days:60,label:'2개월'}, {days:90,label:'3개월'}, {days:100,label:'100일'}

function fmtDateObj(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

function challengePeriodDoneCount(c){
  const cl=state.challengeLogs[c.id]||{};

  let done=0;
  const start=new Date(c.startDate+'T00:00:00');
  for(let i=0;i<c.duration;i++){
    const d=new Date(start);d.setDate(start.getDate()+i);
    if(cl[fmtDateObj(d)]) done++;
  }
  return done;
}
function isChallengeDurationPassed(days){
  return state.challenges.some(c=>c.duration===days&&challengePeriodDoneCount(c)>=challengeDurationThreshold(days));
}
function isChallengeDurationUnlocked(days){
  const idx=CHALLENGE_DURATIONS.findIndex(d=>d.days===days);
  if(idx<=0) return true;
  return isChallengeDurationPassed(CHALLENGE_DURATIONS[idx-1].days);
}
function firstUnlockedChallengeDuration(){
  let last=CHALLENGE_DURATIONS[0].days;
  for(const d of CHALLENGE_DURATIONS){ if(isChallengeDurationUnlocked(d.days)) last=d.days; else break; }
  return last;
}
function renderDurationSelect(targetId, selected, handlerName, allowSelected=false){
  const el=document.getElementById(targetId); if(!el)return;
  el.innerHTML=CHALLENGE_DURATIONS.map((d,idx)=>{
    const unlocked=isChallengeDurationUnlocked(d.days)||(allowSelected&&d.days===selected);
    const need=challengeDurationThreshold(d.days);
    const prev=CHALLENGE_DURATIONS[idx-1];
    const title=unlocked?'':(prev?`${prev.label} 챌린지 ${challengeDurationThreshold(prev.days)}회 이상 달성 시 해금`:'');
    return `<button type="button" class="select-btn${d.days===selected?' selected':''}${unlocked?'':' locked'}" data-val="${d.days}" ${unlocked?`onclick="${handlerName}(this)"`:'disabled'} title="${title}">${d.label}${unlocked?'':' 🔒'}${d.days>=7?`<span style="font-size:10px;color:var(--text-dim);margin-left:4px">${need}회</span>`:''}</button>`;
  }).join('');
}
function syncDurationSelects(allowCurrent=false){
  renderDurationSelect('duration-select', cDur, 'selectDuration', allowCurrent);
  renderDurationSelect('duration-select-mixed', cDurMixed, 'selectDurationMixed', allowCurrent);
}
let cDur=1,cDurMixed=1,cChalType='period',cAchieveMode='simple',cChalCat='health';
function selectAchieveMode(b){
  document.querySelectorAll('#chal-achieve-select .select-btn').forEach(x=>x.classList.remove('selected'));
  b.classList.add('selected');cAchieveMode=b.dataset.val;
  document.getElementById('chal-level-desc-section').style.display=cAchieveMode==='levels'?'block':'none';
}
function _resetAchieveModeUI(mode){
  cAchieveMode=mode||'simple';
  document.querySelectorAll('#chal-achieve-select .select-btn').forEach(b=>b.classList.toggle('selected',b.dataset.val===cAchieveMode));
  document.getElementById('chal-level-desc-section').style.display=cAchieveMode==='levels'?'block':'none';
}
function _resetChalTypeUI(type){
  cChalType=type;
  document.querySelectorAll('#chal-type-select .select-btn').forEach(b=>b.classList.toggle('selected',b.dataset.val===type));
  document.getElementById('chal-period-section').style.display=type==='period'?'':'none';
  document.getElementById('chal-count-section').style.display=type==='count'?'':'none';
  document.getElementById('chal-mixed-section').style.display=type==='mixed'?'':'none';
  syncDurationSelects();
}
function selectDurationMixed(b){if(b.disabled)return;document.querySelectorAll('#duration-select-mixed .select-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');cDurMixed=parseInt(b.dataset.val);}
function syncChalCatSelect(){
  const el=document.getElementById('chal-cat-select');
  if(!el)return;
  el.innerHTML=getCats().map(c=>`<button class="select-btn${c.id===cChalCat?' selected':''}" data-val="${c.id}" onclick="selectChalCat(this)">${c.icon} ${c.name}</button>`).join('');
}
function selectChalCat(b){document.querySelectorAll('#chal-cat-select .select-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');cChalCat=b.dataset.val;}
function openAddChallenge(){
  document.getElementById('challenge-modal-title').textContent='챌린지 추가';
  document.getElementById('edit-challenge-id').value='';
  document.getElementById('challenge-name-input').value='';
  document.getElementById('delete-challenge-btn').style.display='none';
  cChalCat=getCats()[0]?.id||'health';syncChalCatSelect();
  cDur=firstUnlockedChallengeDuration();cDurMixed=cDur;syncDurationSelects();
  document.getElementById('challenge-count-input').value='10';
  document.getElementById('challenge-start-input').value=today();
  document.getElementById('challenge-memo-enabled').checked=true;
  _resetChalTypeUI('period');
  _resetAchieveModeUI('simple');
  document.getElementById('level-desc-min').value='';
  document.getElementById('level-desc-standard').value='';
  document.getElementById('level-desc-max').value='';
  openModal('challenge-modal');
}
function editChallenge(id){
  const c=state.challenges.find(x=>x.id===id);if(!c)return;
  document.getElementById('challenge-modal-title').textContent='챌린지 수정';
  document.getElementById('edit-challenge-id').value=id;
  document.getElementById('challenge-name-input').value=c.name;
  document.getElementById('delete-challenge-btn').style.display='';
  cChalCat=getChallengeCategory(c);syncChalCatSelect();
  _resetChalTypeUI(c.type||'period');
  if(c.type==='count'){
    document.getElementById('challenge-count-input').value=c.targetCount||10;
  } else if(c.type==='mixed'){
    cDurMixed=c.duration||firstUnlockedChallengeDuration();
    syncDurationSelects(true);
    document.getElementById('challenge-mixed-count-input').value=c.targetCount||5;
  } else {
    cDur=c.duration||firstUnlockedChallengeDuration();
    syncDurationSelects(true);
  }
  document.getElementById('challenge-start-input').value=c.startDate||today();
  document.getElementById('challenge-memo-enabled').checked=c.memoEnabled!==false;
  _resetAchieveModeUI(c.achieveMode||'simple');
  const ld=c.levelDesc||{};
  document.getElementById('level-desc-min').value=ld.min||'';
  document.getElementById('level-desc-standard').value=ld.standard||'';
  document.getElementById('level-desc-max').value=ld.max||'';
  openModal('challenge-modal');
}
function selectDuration(b){if(b.disabled)return;document.querySelectorAll('#duration-select .select-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');cDur=parseInt(b.dataset.val);}
function selectChalType(b){
  _resetChalTypeUI(b.dataset.val);
}
function saveChallenge(){
  const name=document.getElementById('challenge-name-input').value.trim();
  if(!name){showToast('이름을 입력해주세요');return;}
  const eid=document.getElementById('edit-challenge-id').value;
  const startDate=document.getElementById('challenge-start-input').value||today();
  const isCount=cChalType==='count';
  const isMixed=cChalType==='mixed';
  const targetCount=(isCount||isMixed)?Math.max(1,parseInt(document.getElementById(isCount?'challenge-count-input':'challenge-mixed-count-input').value)||5):null;
  const memoEnabled=document.getElementById('challenge-memo-enabled').checked;
  const selectedDuration=isMixed?cDurMixed:(!isCount?cDur:null);
  if(selectedDuration&&!isChallengeDurationUnlocked(selectedDuration)){
    const old=eid?state.challenges.find(x=>x.id===eid):null;
    if(!old||old.duration!==selectedDuration){showToast('이 기간은 아직 해금되지 않았어요');return;}
  }
  if(eid){
    const c=state.challenges.find(x=>x.id===eid);
    if(c){
      c.name=name;c.type=cChalType;c.startDate=startDate;c.achieveMode=cAchieveMode;c.category=cChalCat;c.memoEnabled=memoEnabled;
      if(cAchieveMode==='levels') c.levelDesc={min:document.getElementById('level-desc-min').value.trim(),standard:document.getElementById('level-desc-standard').value.trim(),max:document.getElementById('level-desc-max').value.trim()};
      else delete c.levelDesc;
      if(isCount){c.targetCount=targetCount;delete c.duration;}
      else if(isMixed){c.duration=cDurMixed;c.targetCount=targetCount;}
      else{c.duration=cDur;delete c.targetCount;}
    }
  } else {
    const nid='c'+Date.now();
    const levelDesc=cAchieveMode==='levels'?{min:document.getElementById('level-desc-min').value.trim(),standard:document.getElementById('level-desc-standard').value.trim(),max:document.getElementById('level-desc-max').value.trim()}:null;
    const obj={id:nid,name,category:cChalCat,type:cChalType,startDate,achieveMode:cAchieveMode,memoEnabled,...(levelDesc?{levelDesc}:{})};
    if(isCount){obj.targetCount=targetCount;}
    else if(isMixed){obj.duration=cDurMixed;obj.targetCount=targetCount;}
    else{obj.duration=cDur;}
    state.challenges.push(obj);state.challengeLogs[nid]={};
  }
  save();closeModal('challenge-modal');renderChallenge();renderManage();renderToday();
  showToast(eid?'챌린지가 수정됐어요':'챌린지가 시작됐어요! ⚡');
}
function deleteCurrentChallenge(){
  const id=document.getElementById('edit-challenge-id').value;
  if(!id||!confirm('챌린지를 삭제할까요?'))return;
  state.challenges=state.challenges.filter(c=>c.id!==id);
  save();closeModal('challenge-modal');renderChallenge();renderManage();renderToday();showToast('챌린지가 삭제됐어요');
}
function isChallengeActive(c){
  if(c.type==='count'){const cl=state.challengeLogs[c.id]||{};return Object.values(cl).filter(Boolean).length<c.targetCount;}
  if(c.type==='mixed'){
    const cl=state.challengeLogs[c.id]||{};
    const done=Object.values(cl).filter(Boolean).length;
    const e=new Date(c.startDate);e.setDate(e.getDate()+c.duration);
    const inPeriod=new Date()<e;
    // 기간 내이면서 아직 목표 미달성, 또는 기간 지났지만 달성 여부 표시용으로 false
    return inPeriod&&done<c.targetCount;
  }
  const e=new Date(c.startDate);e.setDate(e.getDate()+c.duration);return new Date()<e;
}
function isMixedSuccess(c){
  const cl=state.challengeLogs[c.id]||{};
  return Object.values(cl).filter(Boolean).length>=c.targetCount;
}
function getDaysElapsed(s){return Math.floor((new Date()-new Date(s))/86400000);}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));

let toastTimer;
function exportData(){
  const box=document.getElementById('export-box');
  box.value=localStorage.getItem('routine_rpg_v4')||'{}';
  box.select();
  showToast('텍스트를 선택했어요. 복사해 주세요!');
}
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2000);
}
function showRankup(catLabel,emoji,rankName,sub,color){
  document.getElementById('rankup-emoji').textContent=emoji;
  document.getElementById('rankup-cat').textContent=catLabel+' 등급 상승!';
  document.getElementById('rankup-title').textContent=rankName;
  document.getElementById('rankup-title').style.color=color;
  document.getElementById('rankup-sub').textContent=sub;
  document.getElementById('rankup-overlay').classList.add('open');
}
function closeRankup(){document.getElementById('rankup-overlay').classList.remove('open');}

// ── INIT ──────────────────────────────────────────
load();
renderToday();
renderMoodBar();
</script>
