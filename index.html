<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>루틴 RPG</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6c63ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="루틴RPG">
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
  }
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0f0e17; --surface: #1a1a2e; --surface2: #16213e; --border: #2a2a4a;
    --health: #ff6b6b; --growth: #6c63ff; --life: #43e97b;
    --gold: #ffd700; --gold-dim: #3d3200;
    --text: #e8e8f0; --text-dim: #7a7a9a;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    min-height: 100vh; max-width: 430px; margin: 0 auto; padding-bottom: 80px;
    overflow-x: hidden;
  }

  /* NAV */
  .nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 430px;
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; z-index: 100;
  }
  .nav-btn {
    flex: 1; padding: 12px 4px 10px; background: none; border: none;
    color: var(--text-dim); font-size: 10px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 4px; transition: color 0.2s;
  }
  .nav-btn .icon { font-size: 22px; }
  .nav-btn.active { color: var(--gold); }

  .screen { display: none; padding: 20px 16px; }
  .screen.active { display: block; }
  .header { margin-bottom: 20px; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header p { color: var(--text-dim); font-size: 13px; margin-top: 4px; }

  /* TODAY SUMMARY */
  .today-summary {
    background: var(--surface); border-radius: 20px;
    padding: 20px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 20px;
  }
  .ring-wrap { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--border); stroke-width: 8; }
  .ring-fg { fill: none; stroke: var(--gold); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.5s; }
  .ring-text {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; font-size: 18px; font-weight: 700;
  }
  .ring-text span { font-size: 10px; color: var(--text-dim); font-weight: 400; }
  .summary-info { flex: 1; }
  .summary-info h2 { font-size: 15px; font-weight: 700; }
  .char-title-badge {
    display: inline-block; margin-top: 4px; font-size: 11px; padding: 2px 10px;
    background: var(--gold-dim); color: var(--gold); border-radius: 20px; border: 1px solid var(--gold);
  }
  .summary-info p { font-size: 13px; color: var(--text-dim); margin-top: 6px; }

  /* EVENT BANNER */
  .event-banner {
    border-radius: 16px; padding: 12px 16px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px;
    border: 1px solid; animation: pulse-border 2s ease-in-out infinite;
  }
  @keyframes pulse-border {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,215,0,0); }
    50%      { box-shadow: 0 0 0 4px rgba(255,215,0,0.15); }
  }
  .event-icon { font-size: 28px; }
  .event-text h4 { font-size: 14px; font-weight: 700; }
  .event-text p  { font-size: 12px; margin-top: 2px; }

  /* MYSTERY ROUTINE highlight */
  .routine-card {
    background: var(--surface); border-radius: 14px; padding: 14px 16px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px;
    border: 1px solid transparent; transition: all 0.15s; cursor: pointer; user-select: none;
    position: relative; overflow: hidden;
  }
  .routine-card.done { opacity: 0.45; border-color: var(--border); }
  .routine-card.done .routine-name { text-decoration: line-through; }
  .routine-card.mystery {
    border-color: var(--gold) !important;
    background: linear-gradient(135deg, var(--surface) 60%, #2a2000 100%);
  }
  .routine-card.mystery::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,215,0,0.06), transparent);
    animation: shimmer 2s infinite;
  }
  @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
  .mystery-badge {
    position: absolute; top: 6px; right: 8px;
    font-size: 10px; font-weight: 700; color: var(--gold);
    background: var(--gold-dim); padding: 1px 6px; border-radius: 10px;
  }
  .check-circle {
    width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 14px; transition: all 0.2s;
  }
  .routine-card.done .check-circle { background: var(--gold); border-color: var(--gold); color: #000; }
  .routine-card.failed .check-circle { background: rgba(230,57,70,0.15); border-color: #e63946; color: #e63946; }
  .routine-card.failed .routine-name { text-decoration: line-through; color: var(--text-dim); }
  .routine-info { flex: 1; }
  .routine-name { font-size: 14px; font-weight: 500; }
  .routine-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .routine-badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }

  /* POP ANIMATION on check */
  .routine-card.popping .check-circle { animation: pop-circle 0.35s ease; }
  @keyframes pop-circle { 0%{transform:scale(1)} 40%{transform:scale(1.5)} 100%{transform:scale(1)} }

  /* FLOATING REWARD */
  .float-reward {
    position: fixed; font-weight: 900; pointer-events: none;
    z-index: 500; animation: float-up 1.1s ease forwards;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    font-size: 22px;
  }
  @keyframes float-up {
    0%   { transform: translateY(0) scale(0.5); opacity: 1; }
    30%  { transform: translateY(-20px) scale(1.2); opacity: 1; }
    100% { transform: translateY(-80px) scale(0.9); opacity: 0; }
  }

  /* IDENTITY TOAST */
  .identity-toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
    z-index: 450; pointer-events: none;
    background: rgba(15,14,23,0.92); border: 1px solid rgba(108,99,255,0.5);
    border-radius: 16px; padding: 14px 22px;
    max-width: 320px; text-align: center;
    opacity: 0; transition: opacity 0.4s ease, transform 0.4s ease;
    backdrop-filter: blur(8px);
  }
  .identity-toast.identity-show {
    opacity: 1; transform: translateX(-50%) translateY(0);
  }
  .identity-toast.identity-hide {
    opacity: 0; transform: translateX(-50%) translateY(-10px);
  }
  .identity-quote {
    font-size: 14px; font-weight: 600; color: #a8a4ff;
    line-height: 1.5; letter-spacing: -0.2px;
  }

  /* COMBO */
  .combo-display {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    z-index: 500; text-align: center; pointer-events: none;
    animation: combo-in 0.3s ease;
  }
  @keyframes combo-in { 0%{transform:translateX(-50%) scale(0.5)} 60%{transform:translateX(-50%) scale(1.1)} 100%{transform:translateX(-50%) scale(1)} }
  .combo-text { font-size: 28px; font-weight: 900; color: var(--gold); text-shadow: 0 0 20px rgba(255,215,0,0.8); }
  .combo-sub  { font-size: 13px; color: var(--text-dim); margin-top: 2px; }

  /* MILESTONE OVERLAY */
  .milestone-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85); z-index: 400;
    align-items: center; justify-content: center;
  }
  .milestone-overlay.open { display: flex; }
  .milestone-box { text-align: center; padding: 40px 30px; animation: pop 0.4s ease; }
  @keyframes pop { 0%{transform:scale(0.4);opacity:0} 60%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
  .milestone-emoji { font-size: 72px; margin-bottom: 12px; }
  .milestone-title { font-size: 26px; font-weight: 900; color: var(--gold); margin-bottom: 8px; }
  .milestone-sub { font-size: 15px; color: var(--text-dim); }
  .milestone-close { margin-top: 24px; background: var(--gold); color: #000; border: none; border-radius: 14px; padding: 12px 36px; font-size: 16px; font-weight: 700; cursor: pointer; }

  /* JACKPOT OVERLAY */
  .jackpot-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.9); z-index: 450;
    align-items: center; justify-content: center; flex-direction: column;
  }
  .jackpot-overlay.open { display: flex; }
  .jackpot-box { text-align: center; animation: pop 0.35s ease; }
  .jackpot-slots { font-size: 48px; margin-bottom: 16px; letter-spacing: 12px; }
  .jackpot-title { font-size: 36px; font-weight: 900; background: linear-gradient(90deg,#ff6b6b,#ffd700,#43e97b); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .jackpot-reward { font-size: 20px; color: var(--gold); margin-top: 8px; }
  .jackpot-close { margin-top: 24px; background: linear-gradient(90deg,#ff6b6b,#ffd700); color: #000; border: none; border-radius: 14px; padding: 12px 36px; font-size: 16px; font-weight: 700; cursor: pointer; }

  /* PARTICLES */
  .particle {
    position: fixed; border-radius: 50%; pointer-events: none; z-index: 490;
    animation: particle-fly var(--dur) ease forwards;
  }
  @keyframes particle-fly {
    0%   { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
  }

  /* CAT SECTION */
  .cat-section { margin-bottom: 20px; }
  .cat-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .cat-dot { width: 10px; height: 10px; border-radius: 50%; }
  .cat-header h3 { font-size: 15px; font-weight: 600; }
  .cat-count { margin-left: auto; font-size: 12px; color: var(--text-dim); }

  /* BUNDLE */
  .bundle-wrap { margin-bottom: 20px; }
  .bundle-header {
    background: var(--surface2); border-radius: 14px 14px 0 0; padding: 12px 16px;
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    border: 1px solid var(--border); border-bottom: none;
  }
  .bundle-title { font-size: 14px; font-weight: 600; }
  .bundle-prog { margin-left: auto; font-size: 12px; color: var(--text-dim); }
  .bundle-body {
    background: var(--surface2); border-radius: 0 0 14px 14px;
    border: 1px solid var(--border); border-top: none;
    overflow: hidden; max-height: 1000px; transition: max-height 0.3s;
  }
  .bundle-body.collapsed { max-height: 0; }
  .bundle-body .routine-card { border-radius:0; border:none; border-bottom:1px solid var(--border); background:transparent; margin-bottom:0; }
  .bundle-body .routine-card:last-child { border-bottom: none; }

  /* CHALLENGE */
  .challenge-card { background:var(--gold-dim); border:1px solid rgba(255,215,0,0.3); border-radius:14px; padding:14px 16px; margin-bottom:8px; }
  .challenge-card-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .challenge-card-header h4 { font-size:14px; font-weight:600; flex:1; }
  .challenge-done-btn { font-size:11px; padding:4px 10px; background:var(--gold); color:#000; border:none; border-radius:20px; cursor:pointer; font-weight:700; }
  .challenge-bar { height:6px; background:rgba(255,215,0,0.2); border-radius:3px; overflow:hidden; }
  .challenge-bar-fill { height:100%; background:var(--gold); border-radius:3px; transition:width 0.3s; }
  .challenge-info { display:flex; justify-content:space-between; margin-top:6px; font-size:11px; color:var(--text-dim); }

  /* CHARACTER */
  .char-hero {
    background: linear-gradient(160deg,#1a1a2e 0%,#16213e 60%,#0f0e17 100%);
    border:1px solid var(--border); border-radius:24px;
    padding:28px 20px 24px; margin-bottom:20px; text-align:center; position:relative; overflow:hidden;
  }
  .char-hero::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 0%,rgba(255,215,0,0.08) 0%,transparent 70%); }
  .char-avatar-big { width:120px; height:auto; margin:0 auto 10px; display:block; font-size:0; line-height:0; }
  .char-age-badge { display:inline-block; font-size:11px; color:var(--text-dim); background:var(--surface2); border-radius:20px; padding:3px 12px; margin-bottom:8px; }
  .char-main-title { font-size:22px; font-weight:800; color:var(--gold); text-shadow:0 0 20px rgba(255,215,0,0.4); margin-bottom:6px; }
  .char-sub-desc { font-size:13px; color:var(--text-dim); line-height:1.6; max-width:260px; margin:0 auto; }

  .weekly-cmp-card { background:var(--surface); border-radius:20px; padding:18px 20px; margin-bottom:16px; border:1px solid var(--border); }
  .wcmp-summary { font-size:22px; font-weight:800; margin:6px 0 16px; }
  .wcmp-group { margin-bottom:14px; }
  .wcmp-group-label { font-size:11px; font-weight:700; color:var(--text-dim); margin-bottom:6px; letter-spacing:0.4px; }
  .wcmp-chip-list { display:flex; flex-wrap:wrap; gap:6px; }
  .wcmp-chip { font-size:12px; font-weight:600; padding:5px 12px; border-radius:20px; }
  .trust-header { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
  .trust-emoji { font-size:32px; flex-shrink:0; }
  .trust-label { font-size:11px; color:var(--text-dim); margin-bottom:2px; }
  .trust-quote { font-size:12px; color:var(--text-dim); font-style:italic; }
  .trust-score { margin-left:auto; font-size:32px; font-weight:800; background:linear-gradient(135deg,#6c63ff,#43e97b); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .trust-level-name { font-size:16px; font-weight:700; margin-bottom:2px; }

  .stat-ranks { display:grid; grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); gap:12px; margin-bottom:20px; }
  .rank-card { background:var(--surface); border-radius:16px; padding:16px 12px; border:1px solid var(--border); text-align:center; position:relative; overflow:hidden; }
  .rank-card::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; }
  .rank-card.health::after { background:var(--health); }
  .rank-card.growth::after { background:var(--growth); }
  .rank-card.life::after   { background:var(--life); }
  .rank-icon { font-size:26px; margin-bottom:6px; }
  .rank-cat  { font-size:10px; color:var(--text-dim); margin-bottom:4px; }
  .rank-name { font-size:13px; font-weight:700; margin-bottom:8px; }
  .rank-pts  { font-size:22px; font-weight:800; color:var(--gold); }
  .rank-next { font-size:10px; color:var(--text-dim); margin-top:4px; }
  .rank-bar  { height:4px; background:var(--border); border-radius:2px; margin-top:8px; overflow:hidden; }
  .rank-bar-fill { height:100%; border-radius:2px; transition:width 0.5s; }

  .title-collection { background:var(--surface); border-radius:20px; padding:20px; margin-bottom:20px; border:1px solid var(--border); }
  .title-collection h3 { font-size:15px; font-weight:600; margin-bottom:4px; }
  .title-collection p { font-size:12px; color:var(--text-dim); margin-bottom:16px; }
  .title-grid { display:flex; flex-direction:column; gap:8px; }
  .title-item { display:flex; align-items:center; gap:12px; padding:10px 14px; border-radius:12px; background:var(--surface2); border:1px solid var(--border); opacity:0.35; }
  .title-item.unlocked { opacity:1; border-color:var(--gold); background:var(--gold-dim); }
  .title-item.current  { box-shadow:0 0 0 2px var(--gold); }
  .title-emoji { font-size:22px; }
  .title-info  { flex:1; }
  .title-name  { font-size:14px; font-weight:700; color:var(--gold); }
  .title-cond  { font-size:11px; color:var(--text-dim); margin-top:2px; }

  .month-report-card { background:var(--surface); border-radius:20px; padding:20px; margin-bottom:20px; border:1px solid var(--border); }
  .report-month-label { font-size:11px; color:var(--text-dim); margin-bottom:10px; letter-spacing:0.5px; text-transform:uppercase; }
  .report-narrative { font-size:14px; line-height:1.85; color:var(--text); margin-bottom:16px; }
  .report-narrative strong { color:var(--gold); font-weight:700; }
  .report-routine-rows { display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }
  .report-routine-row { display:flex; align-items:center; gap:10px; }
  .report-routine-name { font-size:12px; color:var(--text-dim); width:80px; flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .report-routine-bar-wrap { flex:1; height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
  .report-routine-bar-fill { height:100%; border-radius:3px; transition:width 0.6s; }
  .report-routine-count { font-size:11px; color:var(--text-dim); width:36px; text-align:right; flex-shrink:0; }
  .report-strategy { background:var(--surface2); border-radius:14px; padding:14px 16px; border-left:3px solid #6c63ff; }
  .report-strategy-label { font-size:10px; color:#6c63ff; font-weight:700; letter-spacing:0.5px; margin-bottom:6px; }
  .report-strategy-text { font-size:13px; line-height:1.7; color:var(--text); }
  .report-mini-stats { display:flex; gap:12px; margin-bottom:16px; }
  .report-mini-stat { flex:1; background:var(--surface2); border-radius:12px; padding:10px 12px; text-align:center; }
  .report-mini-val { font-size:20px; font-weight:800; }
  .report-mini-label { font-size:10px; color:var(--text-dim); margin-top:2px; }
  .month-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
  .month-stat { text-align:center; }
  .month-stat-val { font-size:22px; font-weight:700; }
  .month-stat-label { font-size:11px; color:var(--text-dim); margin-top:4px; }

  /* RECORDS */
  .calendar-card { background:var(--surface); border-radius:20px; padding:20px; margin-bottom:20px; border:1px solid var(--border); }
  .cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .cal-header h3 { font-size:16px; font-weight:600; }
  .cal-nav { display:flex; gap:8px; }
  .cal-nav button { background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:4px 10px; cursor:pointer; font-size:14px; }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .cal-day-label { text-align:center; font-size:11px; color:var(--text-dim); padding:4px; }
  .cal-day { aspect-ratio:1; border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:12px; background:var(--surface2); position:relative; overflow:visible; }
  .cal-day.empty  { background:transparent; }
  .cal-day.today  { border:2px solid var(--gold); }
  .cal-day.future { opacity:0.25; }
  .cal-day.full    { background:#111; }
  .cal-day.partial { background:#111; }
  .cal-day-num { font-size:10px; position:relative; z-index:1; line-height:1; }
  .cal-day.full    .cal-day-num { color:#52b788; }
  .cal-day.partial .cal-day-num { color:var(--text-dim); }
  .cal-day.none    .cal-day-num { color:var(--text-dim); }
  .cal-day.future  .cal-day-num { color:var(--text-dim); }
  .cal-stamp {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    pointer-events:none; z-index:2;
  }
  .stamp-seal {
    width:72%; height:72%;
    border-radius:50%;
    border:2px solid #e63946;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 0 1px #e6394633 inset;
    transform:rotate(-15deg);
    position:relative;
  }
  .stamp-seal::before {
    content:'';
    position:absolute; inset:3px;
    border-radius:50%;
    border:1px dashed #e6394655;
  }
  .stamp-check {
    font-size:13px; color:#e63946; font-weight:900;
    line-height:1; transform:rotate(15deg);
    font-style:normal;
  }
  .cal-day.partial .stamp-seal { border-color:#e63946; box-shadow:0 0 0 1px #e6394633 inset; }
  .cal-day.partial .stamp-seal::before { border-color:#e6394677; }
  .cal-day.partial .stamp-check { color:#e63946; }
  .cal-day.mid     .stamp-seal { border-color:#ffd700; box-shadow:0 0 0 1px #ffd70033 inset; }
  .cal-day.mid     .stamp-seal::before { border-color:#ffd70077; }
  .cal-day.mid     .stamp-check { color:#ffd700; }
  .stamp-star { width:78%; height:78%; opacity:0.85; transform:rotate(-10deg); }
  .stamp-star-mood { dominant-baseline:middle; }
  .stamp-mood { font-size:13px; line-height:1; transform:rotate(15deg); display:inline-block; }
  .stamp-mood-only { font-size:16px; line-height:1; }
  .streak-row { display:flex; gap:12px; margin-bottom:20px; }
  .streak-card { flex:1; background:var(--surface); border-radius:16px; padding:16px; border:1px solid var(--border); text-align:center; }
  .streak-val   { font-size:28px; font-weight:700; color:var(--gold); }
  .streak-label { font-size:12px; color:var(--text-dim); margin-top:4px; }
  .cat-breakdown { background:var(--surface); border-radius:20px; padding:20px; border:1px solid var(--border); }
  .cat-breakdown h3 { font-size:15px; font-weight:600; margin-bottom:16px; }
  .breakdown-item { margin-bottom:14px; }
  .breakdown-label { display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px; }
  .breakdown-bar  { height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
  .breakdown-fill { height:100%; border-radius:4px; transition:width 0.5s; }

  /* MANAGE */
  .manage-section { margin-bottom:24px; }
  .manage-section h3 { font-size:15px; font-weight:600; margin-bottom:12px; }
  .add-btn { width:100%; padding:14px; background:var(--surface); border:1px dashed var(--border); color:var(--text-dim); border-radius:14px; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:8px; }
  .add-btn:hover { border-color:var(--gold); color:var(--gold); }
  .routine-manage-card { background:var(--surface); border-radius:14px; padding:12px 16px; margin-bottom:8px; display:flex; align-items:center; gap:12px; border:1px solid var(--border); }
  .manage-dot  { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .manage-info { flex:1; }
  .manage-name { font-size:14px; font-weight:500; }
  .manage-sub  { font-size:11px; color:var(--text-dim); margin-top:2px; }
  .manage-actions { display:flex; gap:6px; }
  .icon-btn { background:var(--surface2); border:1px solid var(--border); color:var(--text-dim); border-radius:8px; width:32px; height:32px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:14px; }
  .toggle-btn { background:none; border:none; cursor:pointer; font-size:20px; padding:0; }
  .challenge-manage-card { background:var(--gold-dim); border-radius:14px; padding:12px 16px; margin-bottom:8px; display:flex; align-items:center; gap:12px; border:1px solid rgba(255,215,0,0.3); }
  .drag-handle { font-size:18px; color:var(--text-dim); cursor:grab; padding:4px 6px; touch-action:none; flex-shrink:0; }
  .drag-handle:active { cursor:grabbing; }
  .routine-manage-card.drag-over { border-color:var(--gold); background:rgba(255,215,0,0.08); }
  .routine-manage-card.dragging { opacity:0.4; }

  /* DAY DETAIL */
  .day-detail-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .day-detail-row:last-child { border-bottom: none; }
  .day-detail-row.done { opacity: 0.5; }

  /* FAIL REASON */
  .fail-btn {
    background: none; border: none; cursor: pointer;
    font-size: 15px; padding: 4px; opacity: 0.5;
    transition: opacity 0.15s; flex-shrink: 0;
  }
  .fail-btn:hover { opacity: 1; }
  .fail-tag {
    font-size: 11px; color: var(--text-dim);
    margin-top: 3px;
  }
  .fail-reason-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .fail-reason-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 8px; cursor: pointer;
    font-size: 22px; color: var(--text-dim); transition: all 0.15s;
  }
  .fail-reason-btn span { font-size: 11px; line-height: 1.3; text-align: center; }
  .fail-reason-btn.selected { border-color: #6c63ff; background: rgba(108,99,255,0.15); color: var(--text); }
  .fail-reason-btn:hover { border-color: var(--text-dim); }
  .history-cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-top:8px; }
  .history-cal-label { text-align:center; font-size:10px; color:var(--text-dim); padding:2px 0; }
  .history-cal-day { aspect-ratio:1; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:10px; background:var(--surface2); color:var(--text-dim); }
  .history-cal-day.empty { background:transparent; }
  .history-cal-day.done { background:var(--gold); color:#000; font-weight:700; }
  .history-cal-day.today-mark { outline:2px solid var(--gold); outline-offset:-2px; }
  .history-month-label { font-size:12px; font-weight:600; color:var(--text-dim); margin:12px 0 4px; }
  .fail-insight {
    background: rgba(108,99,255,0.1); border: 1px solid rgba(108,99,255,0.3);
    border-radius: 14px; padding: 16px; margin-bottom: 4px;
  }
  .fail-insight-top { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
  .fail-insight-reason { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .fail-insight-advice { font-size: 13px; color: #a8a4ff; line-height: 1.6; }

  /* MOOD BAR */
  .mood-bar { display:flex; align-items:center; gap:8px; background:var(--surface); border-radius:16px; padding:10px 14px; margin-bottom:14px; }
  .mood-label { font-size:11px; color:var(--text-dim); white-space:nowrap; margin-right:4px; }
  .mood-btns { display:flex; gap:6px; flex:1; justify-content:space-around; }
  .mood-btn { background:none; border:2px solid transparent; border-radius:12px; padding:4px 6px; cursor:pointer; font-size:20px; transition:transform 0.15s,border-color 0.15s; line-height:1; }
  .mood-btn:hover { transform:scale(1.2); }
  .mood-btn.selected { border-color:var(--gold); background:var(--gold-dim); transform:scale(1.15); }

  /* COLOR PALETTE */
  .color-palette { display:flex; gap:10px; flex-wrap:wrap; }
  .color-btn { width:32px; height:32px; border-radius:50%; border:3px solid transparent; cursor:pointer; transition:border-color 0.15s; }
  .color-btn.selected { border-color: #fff; }

  /* MODAL */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:200; align-items:flex-end; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface); border-radius:24px 24px 0 0; padding:24px; width:100%; max-width:430px; max-height:92vh; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom:max(24px,env(safe-area-inset-bottom)); }
  .modal h3 { font-size:18px; font-weight:700; margin-bottom:20px; }
  .form-group { margin-bottom:16px; }
  .form-group label { font-size:13px; color:var(--text-dim); display:block; margin-bottom:8px; }
  .form-group input,.form-group select { width:100%; padding:12px 14px; background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:12px; font-size:14px; outline:none; font-family:inherit; }
  .form-group input:focus,.form-group select:focus { border-color:var(--gold); }
  .form-actions { display:flex; gap:12px; margin-top:20px; }
  .btn { flex:1; padding:14px; border:none; border-radius:14px; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; }
  .btn-primary   { background:var(--gold); color:#000; }
  .btn-secondary { background:var(--surface2); color:var(--text-dim); }
  .btn-danger    { background:#3d1f1f; color:var(--health); border:1px solid var(--health); }
  .select-group { display:flex; gap:8px; flex-wrap:wrap; }
  .select-btn { padding:8px 16px; border-radius:20px; border:1px solid var(--border); background:var(--surface2); color:var(--text-dim); cursor:pointer; font-size:13px; font-family:inherit; transition:all 0.2s; }
  .select-btn.selected { border-color:var(--gold); color:var(--gold); background:var(--gold-dim); }

  /* TOAST */
  .toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:10px 20px; font-size:13px; z-index:300; opacity:0; transition:opacity 0.3s; white-space:nowrap; max-width:90%; }
  .toast.show { opacity:1; }

  /* RANK UP */
  .rankup-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:410; align-items:center; justify-content:center; flex-direction:column; }
  .rankup-overlay.open { display:flex; }
  .rankup-box { text-align:center; padding:40px 30px; animation:pop 0.4s ease; }
  .rankup-emoji { font-size:80px; margin-bottom:16px; }
  .rankup-cat   { font-size:14px; color:var(--text-dim); margin-bottom:8px; }
  .rankup-title { font-size:30px; font-weight:900; margin-bottom:8px; }
  .rankup-sub   { font-size:15px; color:var(--text-dim); }
  .rankup-close { margin-top:28px; background:var(--gold); color:#000; border:none; border-radius:14px; padding:12px 36px; font-size:16px; font-weight:700; cursor:pointer; }

  .empty-state { text-align:center; padding:30px; color:var(--text-dim); font-size:14px; }
</style>
</head>
<body>

<!-- TODAY -->
<div id="screen-today" class="screen active">
  <div class="header">
    <h1 id="today-date"></h1>
    <p id="today-greeting"></p>
  </div>
  <div class="today-summary">
    <div class="ring-wrap">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <circle class="ring-bg" cx="40" cy="40" r="32"/>
        <circle class="ring-fg" id="ring-fg" cx="40" cy="40" r="32" stroke-dasharray="201" stroke-dashoffset="201"/>
      </svg>
      <div class="ring-text"><strong id="ring-pct">0%</strong><span>완료</span></div>
    </div>
    <div class="summary-info" style="flex:1">
      <h2 id="char-display-name">내 캐릭터</h2>
      <div class="char-title-badge" id="today-char-title">새내기 루티너</div>
      <p id="today-done-count" style="margin-top:8px">0 / 0 완료</p>
    </div>
  </div>
  <div class="mood-bar" id="mood-bar"></div>
  <div id="event-banner-wrap"></div>
  <div id="routine-list"></div>
</div>

<!-- CHARACTER -->
<div id="screen-char" class="screen">
  <div class="header"><h1>캐릭터</h1><p>루틴마다 다른 스탯이 자라요</p></div>
  <div class="char-hero">
    <div class="char-main-title" id="char-main-title">칭호</div>
    <div class="char-sub-desc" id="char-sub-desc"></div>
  </div>
  <div id="habit-card"></div>
  <div class="stat-ranks" id="stat-ranks"></div>
  <div class="title-collection">
    <h3>🏆 칭호 수집</h3>
    <p>달성 조건을 채우면 칭호가 해금돼요</p>
    <div class="title-grid" id="title-grid"></div>
  </div>
</div>

<!-- RECORDS -->
<div id="screen-records" class="screen">
  <div class="header"><h1>기록</h1></div>
  <div class="streak-row">
    <div class="streak-card"><div class="streak-val" id="streak-cur">0</div><div class="streak-label">🔥 현재 연속</div></div>
    <div class="streak-card"><div class="streak-val" id="streak-best">0</div><div class="streak-label">⚡ 최고 연속</div></div>
  </div>
  <div class="calendar-card">
    <div class="cal-header">
      <h3 id="cal-month-label"></h3>
      <div class="cal-nav"><button onclick="calPrev()">‹</button><button onclick="calNext()">›</button></div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <div class="cat-breakdown">
    <h3>카테고리별 달성률</h3>
    <div id="breakdown-list"></div>
  </div>
  <div class="month-report-card" id="month-report-card"></div>
  <div class="cat-breakdown" style="margin-top:16px">
    <h3 id="fail-analysis-header">📊 실패 분석</h3>
    <div id="fail-analysis"></div>
  </div>
</div>

<!-- MANAGE -->
<div id="screen-manage" class="screen">
  <div class="header"><h1>루틴 관리</h1></div>
  <div class="manage-section">
    <h3>🏷️ 카테고리</h3>
    <div id="category-manage-list"></div>
    <button class="add-btn" onclick="openAddCategory()">+ 카테고리 추가</button>
  </div>
  <div class="manage-section">
    <h3>내 루틴</h3>
    <div id="manage-list"></div>
    <button class="add-btn" onclick="openAddRoutine()">+ 루틴 추가</button>
  </div>
  <div class="manage-section">
    <h3>⚡ 챌린지</h3>
    <div id="challenge-manage-list"></div>
    <button class="add-btn" onclick="openAddChallenge()">+ 챌린지 추가</button>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showScreen('today',this)"><span class="icon">☀️</span>오늘</button>
  <button class="nav-btn" onclick="showScreen('char',this)"><span class="icon">🧙</span>캐릭터</button>
  <button class="nav-btn" onclick="showScreen('records',this)"><span class="icon">📊</span>기록</button>
  <button class="nav-btn" onclick="showScreen('manage',this)"><span class="icon">⚙️</span>관리</button>
</nav>

<!-- ROUTINE MODAL -->
<div class="modal-overlay" id="routine-modal">
  <div class="modal">
    <h3 id="routine-modal-title">루틴 추가</h3>
    <input type="hidden" id="edit-routine-id">
    <div class="form-group"><label>루틴 이름</label><input type="text" id="routine-name-input" placeholder="예: 영양제 먹기"></div>
    <div class="form-group"><label>그룹 (선택)</label>
      <div class="select-group" id="group-select">
        <button class="select-btn selected" data-val="" onclick="selectGroup(this)">없음</button>
        <button class="select-btn" data-val="morning" onclick="selectGroup(this)">🌅 모닝</button>
        <button class="select-btn" data-val="night" onclick="selectGroup(this)">🌙 나이트</button>
      </div>
    </div>
    <div class="form-group"><label>카테고리</label>
      <div class="select-group" id="cat-select"></div>
    </div>
    <div class="form-group"><label>주기</label>
      <div class="select-group" id="freq-select">
        <button class="select-btn selected" data-val="daily" onclick="selectFreq(this)">매일</button>
        <button class="select-btn" data-val="weekly6" onclick="selectFreq(this)">주 6회</button>
        <button class="select-btn" data-val="weekly5" onclick="selectFreq(this)">주 5회</button>
        <button class="select-btn" data-val="weekly4" onclick="selectFreq(this)">주 4회</button>
        <button class="select-btn" data-val="weekly3" onclick="selectFreq(this)">주 3회</button>
        <button class="select-btn" data-val="weekly2" onclick="selectFreq(this)">주 2회</button>
        <button class="select-btn" data-val="weekly" onclick="selectFreq(this)">주 1회</button>
        <button class="select-btn" data-val="monthly" onclick="selectFreq(this)">월 1회</button>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal('routine-modal')">취소</button>
      <button class="btn btn-danger" id="delete-routine-btn" style="display:none" onclick="deleteCurrentRoutine()">삭제</button>
      <button class="btn btn-primary" onclick="saveRoutine()">저장</button>
    </div>
  </div>
</div>

<!-- DAY DETAIL MODAL -->
<div class="modal-overlay" id="day-detail-modal">
  <div class="modal">
    <h3 id="day-detail-title"></h3>
    <div id="day-detail-list"></div>
    <div class="form-actions" style="margin-top:16px">
      <button class="btn btn-secondary" onclick="closeModal('day-detail-modal')">닫기</button>
    </div>
  </div>
</div>

<!-- FAIL REASON MODAL -->
<div class="modal-overlay" id="fail-modal">
  <div class="modal">
    <h3>오늘 못 한 이유가 뭐예요?</h3>
    <p style="font-size:13px;color:var(--text-dim);margin-bottom:16px">자책 말고, 데이터로 남겨봐요 📊</p>
    <input type="hidden" id="fail-routine-id">
    <div class="fail-reason-grid" id="fail-reason-grid"></div>
    <div class="form-actions" style="margin-top:16px">
      <button class="btn btn-secondary" onclick="clearFailReason()">기록 지우기</button>
      <button class="btn btn-secondary" onclick="closeModal('fail-modal')">닫기</button>
    </div>
  </div>
</div>

<!-- HISTORY CALENDAR MODAL -->
<div class="modal-overlay" id="history-modal">
  <div class="modal">
    <h3 id="history-modal-title" style="margin-bottom:4px"></h3>
    <p style="font-size:12px;color:var(--text-dim);margin-bottom:4px" id="history-modal-sub"></p>
    <div id="history-cal-body"></div>
    <div class="form-actions" style="margin-top:16px">
      <button class="btn btn-secondary" onclick="closeModal('history-modal')">닫기</button>
    </div>
  </div>
</div>

<!-- CATEGORY MODAL -->
<div class="modal-overlay" id="category-modal">
  <div class="modal">
    <h3 id="category-modal-title">카테고리 추가</h3>
    <input type="hidden" id="edit-category-id">
    <div class="form-group"><label>이름</label><input type="text" id="category-name-input" placeholder="예: 건강"></div>
    <div class="form-group"><label>아이콘 (이모지 1개)</label><input type="text" id="category-icon-input" placeholder="예: ❤️" maxlength="2"></div>
    <div class="form-group"><label>색상</label>
      <div class="color-palette" id="color-palette">
        <button class="color-btn selected" data-color="#ff6b6b" style="background:#ff6b6b" onclick="selectColor(this)"></button>
        <button class="color-btn" data-color="#6c63ff" style="background:#6c63ff" onclick="selectColor(this)"></button>
        <button class="color-btn" data-color="#43e97b" style="background:#43e97b" onclick="selectColor(this)"></button>
        <button class="color-btn" data-color="#ffd700" style="background:#ffd700" onclick="selectColor(this)"></button>
        <button class="color-btn" data-color="#4ecdc4" style="background:#4ecdc4" onclick="selectColor(this)"></button>
        <button class="color-btn" data-color="#ff9500" style="background:#ff9500" onclick="selectColor(this)"></button>
        <button class="color-btn" data-color="#ff2d55" style="background:#ff2d55" onclick="selectColor(this)"></button>
        <button class="color-btn" data-color="#5ac8fa" style="background:#5ac8fa" onclick="selectColor(this)"></button>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal('category-modal')">취소</button>
      <button class="btn btn-danger" id="delete-category-btn" style="display:none" onclick="deleteCurrentCategory()">삭제</button>
      <button class="btn btn-primary" onclick="saveCategory()">저장</button>
    </div>
  </div>
</div>

<!-- CHALLENGE MODAL -->
<div class="modal-overlay" id="challenge-modal">
  <div class="modal">
    <h3 id="challenge-modal-title">챌린지 추가</h3>
    <input type="hidden" id="edit-challenge-id">
    <div class="form-group"><label>챌린지 이름</label><input type="text" id="challenge-name-input" placeholder="예: 밀가루 2주 금지"></div>
    <div class="form-group"><label>유형</label>
      <div class="select-group" id="chal-type-select">
        <button class="select-btn selected" data-val="period" onclick="selectChalType(this)">📅 기간</button>
        <button class="select-btn" data-val="count" onclick="selectChalType(this)">🔢 횟수</button>
      </div>
    </div>
    <div id="chal-period-section" class="form-group"><label>기간</label>
      <div class="select-group" id="duration-select">
        <button class="select-btn selected" data-val="7" onclick="selectDuration(this)">1주일</button>
        <button class="select-btn" data-val="14" onclick="selectDuration(this)">2주일</button>
        <button class="select-btn" data-val="21" onclick="selectDuration(this)">3주일</button>
        <button class="select-btn" data-val="30" onclick="selectDuration(this)">1개월</button>
        <button class="select-btn" data-val="60" onclick="selectDuration(this)">2개월</button>
        <button class="select-btn" data-val="90" onclick="selectDuration(this)">3개월</button>
      </div>
    </div>
    <div id="chal-count-section" class="form-group" style="display:none"><label>목표 횟수</label>
      <input type="number" id="challenge-count-input" min="1" max="9999" value="10" placeholder="예: 30" style="width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:16px;">
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal('challenge-modal')">취소</button>
      <button class="btn btn-danger" id="delete-challenge-btn" style="display:none" onclick="deleteCurrentChallenge()">삭제</button>
      <button class="btn btn-primary" onclick="saveChallenge()">시작</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- MILESTONE -->
<div class="milestone-overlay" id="milestone-overlay" onclick="closeMilestone()">
  <div class="milestone-box">
    <div class="milestone-emoji" id="milestone-emoji">🎉</div>
    <div class="milestone-title" id="milestone-title"></div>
    <div class="milestone-sub" id="milestone-sub"></div>
    <button class="milestone-close" onclick="closeMilestone()">계속하기</button>
  </div>
</div>

<!-- JACKPOT -->
<div class="jackpot-overlay" id="jackpot-overlay" onclick="closeJackpot()">
  <div class="jackpot-box">
    <div class="jackpot-slots" id="jackpot-slots">🎰🎰🎰</div>
    <div class="jackpot-title">JACKPOT!</div>
    <div class="jackpot-reward" id="jackpot-reward"></div>
    <button class="jackpot-close" onclick="closeJackpot()">🎉 받기!</button>
  </div>
</div>

<!-- RANKUP -->
<div class="rankup-overlay" id="rankup-overlay" onclick="closeRankup()">
  <div class="rankup-box">
    <div class="rankup-emoji" id="rankup-emoji">⬆️</div>

function load() {

  if (raw) { try { const s=JSON.parse(raw); state={...state,...s}; } catch(e){} }
  else { state.routines = JSON.parse(JSON.stringify(DEFAULT_ROUTINES)); }

      const def = DEFAULT_CATEGORIES.find(d => d.id === c.id);

// ── TODAY'S EVENT (date-seeded) ───────────────────
function getTodayEvent() {
  const t = today();
  let h = 0;
  for (let i=0;i<t.length;i++) h = (h*31+t.charCodeAt(i))&0xfffffff;
  return EVENTS[Math.abs(h) % EVENTS.length];
}

// ── TODAY'S MYSTERY ROUTINE (date-seeded) ─────────
function getMysteryRoutineId() {
  const t = today();
  if (state.mysteryDate === t && state.mysteryRoutineId) return state.mysteryRoutineId;
  const active = state.routines.filter(r=>r.active!==false);
  if (!active.length) return null;
  let h = 0;
  for (let i=0;i<t.length;i++) h=(h*37+t.charCodeAt(i)+7)&0xfffffff;
  const id = active[Math.abs(h) % active.length].id;
  state.mysteryRoutineId = id;
  state.mysteryDate = t;
  save();
  return id;
}

// ── RANDOM REWARD ROLL ────────────────────────────
function rollReward(event) {
  let r = Math.random() * TOTAL_WEIGHT, cumul = 0;
  let picked = REWARD_TABLE[0];
  for (const row of REWARD_TABLE) {
    cumul += row.weight;
    if (r <= cumul) { picked = row; break; }
  }
  // mystery day: occasionally reroll for bigger
  if (event.id === 'mystery' && Math.random() < 0.3) {
    const bigPool = REWARD_TABLE.filter(x=>x.pts>=5);
    picked = bigPool[Math.floor(Math.random()*bigPool.length)];
  }
  let pts = picked.pts * event.mult;
  return { pts, label: pts === picked.pts ? picked.label : `+${pts} ${event.mult>1?'×'+event.mult:''}`, type: picked.type };
}

function renderToday() {
  const t = today();
  const d = new Date();
  const days=['일','월','화','수','목','금','토'];
  document.getElementById('today-date').textContent=`${d.getMonth()+1}월 ${d.getDate()}일 ${days[d.getDay()]}요일`;
  const h=d.getHours();
  document.getElementById('today-greeting').textContent=
    h<12?'좋은 아침이에요! 오늘 뭐가 나올지 모르지 않아요? 🎲':
    h<18?'잘 하고 있어요! 계속 달려봐요 🔥':
         '오늘 하루 수고했어요 🌙 마무리 잘 해봐요';

  if (!state.logs[t]) state.logs[t]={};
  const log=state.logs[t];
  const activeR=state.routines.filter(r=>r.active!==false);
  const done=activeR.filter(r=>log[r.id]).length;
  const total=activeR.length;
  const pct=total?Math.round(done/total*100):0;

  document.getElementById('ring-pct').textContent=pct+'%';
  document.getElementById('today-done-count').textContent=`${done} / ${total} 완료`;
  document.getElementById('ring-fg').style.strokeDashoffset=201-(201*pct/100);

  const s=state.character.stats;
  const title=getCurrentTitle(s.health,s.growth,s.life);
  document.getElementById('char-display-name').textContent=state.character.name;
  document.getElementById('today-char-title').textContent=title.emoji+' '+title.name;

  // Event banner
  const ev=getTodayEvent();
  const banner=document.getElementById('event-banner-wrap');
  if (ev.label) {
    banner.innerHTML=`<div class="event-banner" style="background:${ev.color};border-color:${ev.borderColor};margin-bottom:16px">
      <div class="event-icon">🎲</div>
      <div class="event-text">
        <h4 style="color:${ev.borderColor}">${ev.label}</h4>
        <p style="color:var(--text-dim)">${ev.desc}</p>
      </div>
    </div>`;
  } else {
    banner.innerHTML='';
  }

  // Mystery routine
  const mysteryId=getMysteryRoutineId();

  // Groups
  const groups={morning:[],night:[],none:[]};
  activeR.forEach(r=>{
    const g=r.group||'';
    if(g==='night') groups.night.push(r);
    else if(g==='morning') groups.morning.push(r);
    else groups.none.push(r);
  });
  const cats={};
  getCats().forEach(c=>{ cats[c.id]=[]; });
  groups.none.forEach(r=>{ if(cats[r.category]) cats[r.category].push(r); else { cats[r.category]=[r]; } });

  let html='';
  const activeChal=state.challenges.filter(c=>isChallengeActive(c));
  if (activeChal.length) {
    html+=`<div style="margin-bottom:20px"><div style="font-size:13px;font-weight:600;margin-bottom:10px;color:var(--gold)">⚡ 진행 중 챌린지</div>`;
    activeChal.forEach(c=>{
      const cl=state.challengeLogs[c.id]||{};
      const dc=Object.values(cl).filter(Boolean).length;
      const td=cl[t];
      const isCount=c.type==='count';
      const p2=isCount?Math.min(100,Math.round(dc/c.targetCount*100)):Math.round(dc/c.duration*100);
      const el=isCount?null:getDaysElapsed(c.startDate);
      const infoLeft=isCount?`${dc}/${c.targetCount}회`:`${dc}/${c.duration}일`;
      const infoRight=isCount?(dc>=c.targetCount?'🎉 달성!':''):`${c.duration-el}일 남음`;
      html+=`<div class="challenge-card" data-cid="${c.id}" data-cname="${c.name.replace(/"/g,'&quot;')}">
        <div class="challenge-card-header"><h4>⚡ ${c.name}</h4>
          <button class="challenge-done-btn" onclick="toggleChallenge('${c.id}')">${td?'✓ 완료':'오늘 완료'}</button>
        </div>
        <div class="challenge-bar"><div class="challenge-bar-fill" style="width:${p2}%"></div></div>
        <div class="challenge-info"><span>${infoLeft}</span><span>${infoRight}</span></div>
      </div>`;
    });
    html+='</div>';
  }

  getCats().map(c=>c.id).forEach(cat=>{
    if (!cats[cat].length) return;
    const cd=cats[cat].filter(r=>log[r.id]).length;
    html+=`<div class="cat-section"><div class="cat-header">
      <div class="cat-dot" style="background:${catColor(cat)}"></div>
      <h3>${catIcon(cat)} ${catLabel(cat)}</h3>
      <span class="cat-count">${cd}/${cats[cat].length}</span>
    </div>`;
    cats[cat].forEach(r=>{html+=routineCardHTML(r,log[r.id],r.id===mysteryId);});
    html+='</div>';
  });
  if (groups.morning.length) html+=bundleHTML('🌅','모닝 루틴','morning',groups.morning,log,mysteryId);

  document.getElementById('routine-list').innerHTML=html;

    const el=document.getElementById('bundle-body-'+g);

  document.querySelectorAll('.challenge-card[data-cid]').forEach(el=>{

  });
}

function routineCardHTML(r, done, isMystery) {
  const freqLabel=getFreqLabel(r.freq);
  const weekTarget=getWeekTarget(r.freq);
  const weekCount=weekTarget?getWeekCountById(r.id):null;
  const subText=weekTarget?`이번 주 ${weekCount}/${weekTarget}회`:'';
  const t=today();
  const failReason=(state.failLogs[t]||{})[r.id];
  const fr=failReason?FAIL_REASONS.find(x=>x.id===failReason):null;
  return `<div class="routine-card ${done?'done':fr?'failed':''} ${isMystery&&!done?'mystery':''}" data-rid="${r.id}" data-rname="${r.name.replace(/"/g,'&quot;')}" onclick="toggleRoutine('${r.id}',event)">
    ${isMystery&&!done?'<div class="mystery-badge">🎲 보너스?</div>':''}
    <div class="check-circle">${done?'✓':fr?'✕':''}</div>
    <div class="routine-info">
      <div class="routine-name">${r.name}</div>
      ${subText?`<div class="routine-sub">${subText}</div>`:''}
      ${fr?`<div class="fail-tag">${fr.emoji} ${fr.label}</div>`:''}
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      ${freqLabel?`<span class="routine-badge" style="background:${catColor(r.category)}22;color:${catColor(r.category)}">${freqLabel}</span>`:''}
      ${!done?`<button class="fail-btn" onclick="openFailModal('${r.id}',event)" title="못 한 이유 기록">📝</button>`:''}
    </div>
  </div>`;
}

function getFreqLabel(freq){
  const map={daily:'매일',weekly6:'주 6회',weekly5:'주 5회',weekly4:'주 4회',weekly3:'주 3회',weekly2:'주 2회',weekly:'주 1회',monthly:'월 1회'};
  return map[freq]||freq||'매일';
}
function getWeekTarget(freq){
  if(!freq||freq==='daily'||freq==='monthly') return null;
  const m=freq.match(/^weekly(\d+)$/);
  return m?parseInt(m[1]):null;
}
function getWeekCountById(routineId) {
  const d=new Date(),dow=d.getDay(),mon=new Date(d);
  mon.setDate(d.getDate()-(dow===0?6:dow-1));
  let c=0;
  for(let i=0;i<7;i++){
    const dd=new Date(mon);dd.setDate(mon.getDate()+i);
    const k=`${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,'0')}-${String(dd.getDate()).padStart(2,'0')}`;
    if(state.logs[k]?.[routineId]) c++;
  }
  return c;
}

// ── TOGGLE ROUTINE (핵심: 랜덤 보상) ─────────────
function toggleRoutine(id, ev) {
  const t=today();
  if(!state.logs[t]) state.logs[t]={};
  const wasDone=state.logs[t][id];
  // 실패 이유가 기록된 루틴은 체크 불가
  if (!wasDone && state.failLogs[t]?.[id]) {
    showToast('📝 이유 기록을 먼저 지워주세요');
    return;
  }
  state.logs[t][id]=!wasDone;

  const r=state.routines.find(x=>x.id===id);
  if(!r) { save(); renderToday(); return; }

  if (!wasDone) {
    // 체크 ON → 랜덤 보상
    const event=getTodayEvent();
    const isMystery=id===getMysteryRoutineId();
    let reward=rollReward(event);

    // 황금 루틴이면 추가 배율
    if (isMystery) {
      reward.pts = reward.pts * 2;
      reward.label = `+${reward.pts} 🎲 보너스!`;
      reward.type = reward.pts >= 20 ? 'jackpot' : 'great';
    }

    const prev=state.character.stats[r.category]||0;
    recalcStats();
    checkRankUp(r.category, prev, state.character.stats[r.category]);
    checkTitleUnlock();

    // 잭팟?
    if (reward.type==='jackpot') {
      spawnParticles(ev);
      setTimeout(()=>showJackpot(reward, r.category), 200);
    } else {
      // floating reward text
      spawnFloatingReward(ev, reward.label, reward.type);
      if (reward.type==='great') spawnParticles(ev, 8);
    }

    // 정체성 문장
    if (r.identity) {
      setTimeout(()=>showIdentity(r.identity), reward.type==='jackpot' ? 2200 : 400);
    }

    // 콤보
    handleCombo();
    // 마일스톤 체크
    setTimeout(()=>checkMilestone(), 100);

  } else {
    recalcStats();
    comboCount=0;
  }

  save();
  renderToday();
}

function showIdentity(text) {
  const existing = document.querySelector('.identity-toast');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'identity-toast';
  el.innerHTML = `<span class="identity-quote">"${text}"</span>`;
  document.body.appendChild(el);
  requestAnimationFrame(()=>{ el.classList.add('identity-show'); });
  setTimeout(()=>{
    el.classList.add('identity-hide');
    setTimeout(()=>el.remove(), 600);
  }, 2800);
}

function handleCombo() {
  comboCount++;
  clearTimeout(comboTimer);
  if (comboCount >= 3) {
    showCombo(comboCount);
  }
  comboTimer=setTimeout(()=>{ comboCount=0; }, 6000);
}

function showCombo(n) {
  const existing=document.querySelector('.combo-display');
  if (existing) existing.remove();
  const div=document.createElement('div');
  div.className='combo-display';
  const msgs=['','','','3연속 콤보! 🔥','4연속! 🔥🔥','5연속! 💥','6연속!! 💥💥','7연속!!! 🌈','무한 콤보! 👑'];
  const msg=msgs[Math.min(n,msgs.length-1)]||`${n}연속 콤보! 🌈`;

// ── FLOATING REWARD NUMBER ────────────────────────
function spawnFloatingReward(ev, label, type) {
  const colors={normal:'#e8e8f0',lucky:'#ffd700',great:'#ff9500',jackpot:'#ff4466'};
  const el=document.createElement('div');
  el.className='float-reward';
  el.textContent=label;
  el.style.color=colors[type]||'#e8e8f0';
  el.style.left=(window.innerWidth/2-40+Math.random()*80)+'px';
  el.style.top=(window.innerHeight/2)+'px';
  if(type==='great') el.style.fontSize='28px';

// ── PARTICLES ─────────────────────────────────────
function spawnParticles(ev, count=15) {
  const colors=['#ffd700','#ff6b6b','#6c63ff','#43e97b','#ff9500','#a78bfa'];
  const cx=window.innerWidth/2, cy=window.innerHeight/2;
  for(let i=0;i<count;i++){
    const el=document.createElement('div');
    el.className='particle';
    const size=Math.random()*10+6;
    const angle=Math.random()*Math.PI*2;
    const dist=Math.random()*180+60;
    const dur=(Math.random()*0.5+0.6).toFixed(2)+'s';
    el.style.cssText=`
      width:${size}px;height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      left:${cx}px;top:${cy}px;
      --dx:${(Math.cos(angle)*dist).toFixed(0)}px;
      --dy:${(Math.sin(angle)*dist).toFixed(0)}px;
      --dur:${dur};
    `;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), parseFloat(dur)*1000+100);
  }
}

// ── MILESTONE ─────────────────────────────────────
function checkMilestone() {
  const t=today();
  const activeR=state.routines.filter(r=>r.active!==false);
  if(!activeR.length) return;
  const log=state.logs[t]||{};
  const done=activeR.filter(r=>log[r.id]).length;
  const pct=done/activeR.length;

  const milestones=[
    {key:'50',pct:0.5, emoji:'⚡',title:'절반 달성!',    sub:'오늘의 루틴 절반을 완료했어요'},
    {key:'80',pct:0.8, emoji:'🔥',title:'거의 다 왔어!', sub:'80% 돌파! 조금만 더!'},
    {key:'100',pct:1.0,emoji:'👑',title:'완벽한 하루!',  sub:'오늘 모든 루틴을 완료했어요 🎉'},
  ];

  for(const m of milestones){
    const mkey=t+'_'+m.key;
    if(pct>=m.pct && !state.shownMilestones[mkey]){
      state.shownMilestones[mkey]=true;
      save();
      if(m.key==='100') spawnParticles(null,25);
      setTimeout(()=>{
        document.getElementById('milestone-emoji').textContent=m.emoji;
        document.getElementById('milestone-title').textContent=m.title;
        document.getElementById('milestone-sub').textContent=m.sub;
        document.getElementById('milestone-overlay').classList.add('open');
      },400);
      break;
    }
  }
}
function closeMilestone(){document.getElementById('milestone-overlay').classList.remove('open');}

// ── STAT / RANK / TITLE ───────────────────────────
function getRank(table,pts){
  let r=table[0];
  for(const x of table){if(pts>=x.pts)r=x;else break;}
  return r;
}
function getNextRank(table,pts){
  for(const r of table){if(pts<r.pts)return r;}
  return null;
}
function getCurrentTitle(h,g,l){
  let m=COMBINED_TITLES[0];
  for(const t of COMBINED_TITLES){if(t.cond(h,g,l))m=t;}
  return m;
}
function recalcStats() {
  const stats = {};
  getCats().forEach(c => { stats[c.id] = 0; });
  state.routines.forEach(r => {
    if (r.active === false) return;
    Object.values(state.logs).forEach(log => {
      if (log[r.id]) stats[r.category] = (stats[r.category] || 0) + 1;
    });
  });
  state.character.stats = stats;
}

function checkRankUp(cat,prev,next){
  const table=cat==='health'?HEALTH_RANKS:cat==='growth'?GROWTH_RANKS:LIFE_RANKS;
  const pr=getRank(table,prev),nr=getRank(table,next);
  if(nr.pts>pr.pts){
    const col=`var(--${cat})`;
    setTimeout(()=>showRankup(catLabel(cat),nr.emoji,nr.name,nr.name+'가 됐어요!',col),800);
  }
}
function checkTitleUnlock(){
  const {health,growth,life}=state.character.stats;
  COMBINED_TITLES.forEach(t=>{
    if(t.cond(health,growth,life)&&!state.character.unlockedTitles.includes(t.id)){
      state.character.unlockedTitles.push(t.id);
      setTimeout(()=>showToast('🎊 새 칭호 해금: '+t.name),2000);
    }
  });
}

// ── CHARACTER ─────────────────────────────────────
function renderMonthReport(){
  const el=document.getElementById('month-report-card');
  if(!el)return;
  const now=calViewDate||new Date();
  const mk=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const monthName=`${now.getFullYear()}년 ${now.getMonth()+1}월`;
  const ar=state.routines.filter(r=>r.active!==false);

  // 기본 집계
  let trackedDays=0,perfectDays=0,totalDone=0;
  // 루틴별 달성 횟수
  const routineCounts={};
  ar.forEach(r=>{routineCounts[r.id]=0;});
  // 연속/회복 패턴 분석
  const monthEntries=Object.entries(state.logs)
    .filter(([d])=>d.startsWith(mk))
    .sort(([a],[b])=>a.localeCompare(b));

  monthEntries.forEach(([,log])=>{
    trackedDays++;
    const done=ar.filter(r=>log[r.id]);
    totalDone+=done.length;
    if(ar.length&&done.length===ar.length)perfectDays++;
    done.forEach(r=>{routineCounts[r.id]=(routineCounts[r.id]||0)+1;});
  });

  const avg=(trackedDays&&ar.length)?Math.round(totalDone/(trackedDays*ar.length)*100):0;

  // 회복력: 0인 날 다음날 복귀한 비율
  let zeroStreaks=0,recoveries=0;
  for(let i=0;i<monthEntries.length-1;i++){
    const [,log]=monthEntries[i];
    const [,nextLog]=monthEntries[i+1];
    const todayDone=ar.filter(r=>log[r.id]).length;
    const nextDone=ar.filter(r=>nextLog[r.id]).length;
    if(todayDone===0){zeroStreaks++;if(nextDone>0)recoveries++;}
  }
  const recoveryRate=zeroStreaks?Math.round(recoveries/zeroStreaks*100):100;

  // 루틴별 순위 (많이 한 순)
  const routineRanked=ar
    .map(r=>({r,cnt:routineCounts[r.id]||0,rate:trackedDays?Math.round((routineCounts[r.id]||0)/trackedDays*100):0}))
    .sort((a,b)=>b.cnt-a.cnt);

  // 내러티브 생성
  const narrativeParts=[];

  if(trackedDays===0){
    el.innerHTML=`<div class="report-month-label">${monthName} 리포트</div>
      <div class="report-narrative">아직 이번 달 기록이 없어요.<br>오늘부터 시작하면 돼요. 🌱</div>`;
    return;
  }

  // 첫 문장: 이번 달 전체 분위기
  if(avg>=80){
    narrativeParts.push(`이번 달의 나는 <strong>매우 단단했다</strong>. ${avg}%의 달성률은 의지가 아니라 습관이 됐다는 신호다.`);
  } else if(avg>=60){
    narrativeParts.push(`이번 달의 나는 <strong>꾸준히 버텼다</strong>. 완벽하진 않았지만, ${avg}%는 포기하지 않은 증거다.`);
  } else if(avg>=40){
    if(recoveryRate>=60){
      narrativeParts.push(`이번 달의 나는 완벽하진 않았지만, <strong>무너진 뒤 돌아오는 힘이 강해졌다</strong>. 그게 이번 달의 진짜 성과다.`);
    } else {
      narrativeParts.push(`이번 달은 <strong>흔들리는 달</strong>이었다. ${avg}%의 달성률 뒤에는 다시 시작하려는 의지가 있었다.`);
    }
  } else {
    narrativeParts.push(`이번 달은 <strong>쉽지 않았다</strong>. 그럼에도 ${trackedDays}일을 기록으로 남겼다는 것, 그게 시작이다.`);
  }

  // 두 번째 문장: 루틴별 해석
  if(routineRanked.length>=2){
    const best=routineRanked[0];
    const weak=routineRanked[routineRanked.length-1];
    const bestCat=getCat(best.r.category);
    const weakCat=getCat(weak.r.category);
    if(best.cnt>0&&weak.cnt===0){
      narrativeParts.push(`<strong>${best.r.name}</strong>은 ${best.cnt}회 해냈고, <strong>${weak.r.name}</strong>은 한 번도 이어지지 못했다.`);
    } else if(best.cnt>0){
      const weakNote=weak.rate<30?'끊기지는 않았다':'조금 적었다';
      narrativeParts.push(`<strong>${best.r.name}</strong>은 ${best.cnt}회 달성했고, <strong>${weak.r.name}</strong>은 ${weakNote}.`);
    }
  } else if(routineRanked.length===1){
    const only=routineRanked[0];
    narrativeParts.push(`<strong>${only.r.name}</strong>을 ${only.cnt}회 해냈다.`);
  }

  // 세 번째 문장: 회복력
  if(zeroStreaks>0){
    if(recoveryRate>=70){
      narrativeParts.push(`쉬고 싶었던 날도 있었지만, <strong>${recoveryRate}%의 확률로 다음 날 다시 돌아왔다</strong>.`);
    } else if(recoveryRate>0){
      narrativeParts.push(`무너진 날이 ${zeroStreaks}번 있었고, 그중 ${recoveries}번은 스스로 돌아왔다.`);
    }
  }

  // 전략 제안
  let strategy='';
  const weakest=routineRanked[routineRanked.length-1];
  const strongest=routineRanked[0];
  if(avg>=80){
    strategy=`${monthName}의 흐름을 유지하면서, 루틴의 난이도를 한 단계 올려볼 때다. 더 도전적인 목표가 필요하다.`;
  } else if(weakest&&weakest.cnt===0){
    strategy=`다음 달에는 <strong>${weakest.r.name}</strong>을 아예 빼거나, 최소 주 2회로 낮춰서 다시 연결해보는 게 좋다.`;
  } else if(weakest&&weakest.rate<30){
    const targetCnt=Math.max(5, Math.round(trackedDays*0.4));
    strategy=`다음 달에는 <strong>${strongest.r.name}</strong> 유지보다 <strong>${weakest.r.name} 최소 ${targetCnt}회</strong>를 목표로 잡는 게 균형에 좋다.`;
  } else if(recoveryRate<50&&zeroStreaks>2){
    strategy=`다음 달에는 완벽한 날보다 '최소 1개라도'를 목표로 삼아보자. 끊기지 않는 것 자체가 승리다.`;
  } else {
    strategy=`이번 달의 패턴을 그대로 가져가되, <strong>완벽한 날 ${perfectDays+3}일 이상</strong>을 새 목표로 잡아보자.`;
  }

  // 색상 팔레트 (카테고리 색 활용)
  const colors=['#6c63ff','#ff6b6b','#43e97b','#ffd700','#4ecdc4','#ff9500'];

  el.innerHTML=`
    <div class="report-month-label">📅 ${monthName} 리포트</div>
    <div class="report-mini-stats">
      <div class="report-mini-stat">
        <div class="report-mini-val" style="color:var(--gold)">${avg}%</div>
        <div class="report-mini-label">달성률</div>
      </div>
      <div class="report-mini-stat">
        <div class="report-mini-val" style="color:var(--health)">${trackedDays}일</div>
        <div class="report-mini-label">기록한 날</div>
      </div>
      <div class="report-mini-stat">
        <div class="report-mini-val" style="color:var(--life)">${perfectDays}일</div>
        <div class="report-mini-label">완벽한 날</div>
      </div>
    </div>
    <div class="report-narrative">${narrativeParts.join('<br>')}</div>
    ${routineRanked.length?`<div class="report-routine-rows">${routineRanked.map((item,i)=>{
      const pct=routineRanked[0].cnt?Math.round(item.cnt/routineRanked[0].cnt*100):0;
      const color=getCat(item.r.category).color||colors[i%colors.length];
      return `<div class="report-routine-row">
        <div class="report-routine-name">${item.r.name}</div>
        <div class="report-routine-bar-wrap"><div class="report-routine-bar-fill" style="width:${pct}%;background:${color}"></div></div>
        <div class="report-routine-count">${item.cnt}회</div>
      </div>`;
    }).join('')}</div>`:''}
    <div class="report-strategy">
      <div class="report-strategy-label">💡 다음 달 전략</div>
      <div class="report-strategy-text">${strategy}</div>
    </div>
  `;
}

const SELF_TRUST_LEVELS = [
  {min:0,  name:'씨앗',   emoji:'🌱', desc:'첫 발걸음을 내딛고 있어요'},
  {min:20, name:'새싹',   emoji:'🌿', desc:'조금씩 약속을 지켜가고 있어요'},
  {min:40, name:'성장',   emoji:'🌳', desc:'꾸준히 나아가고 있어요'},
  {min:60, name:'단단함', emoji:'💪', desc:'나 자신을 믿기 시작했어요'},
  {min:80, name:'신뢰',   emoji:'⭐', desc:'나는 나와 한 약속을 지키는 사람이에요'},
];
function calcSelfTrust(){
  const logs=Object.entries(state.logs);
  if(!logs.length) return {score:0,activeDays:0,totalDays:0};
  const ar=state.routines.filter(r=>r.active!==false);
  let totalDays=0,activeDays=0;
  logs.forEach(([,log])=>{
    totalDays++;
    if(ar.some(r=>log[r.id])) activeDays++;
  });
  const score=totalDays?Math.round(activeDays/totalDays*100):0;
  return {score,activeDays,totalDays};
}
function getSelfTrustLevel(score){
  let lv=SELF_TRUST_LEVELS[0];
  for(const l of SELF_TRUST_LEVELS){ if(score>=l.min) lv=l; }
  return lv;
}


function getWeekRange(offsetWeeks) {
  const todayStr = today();
  const td = new Date(todayStr);
  const dow = td.getDay();
  const mon = new Date(td); mon.setDate(td.getDate() - (dow === 0 ? 6 : dow - 1) - offsetWeeks * 7);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  return { start: fmt(mon), end: fmt(sun) };
}

function calcWeekRate(routineId, weekStart, weekEnd) {
  let done = 0, total = 0;
  const s = new Date(weekStart), e = new Date(weekEnd);
  const todayStr = today();
  for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (ds > todayStr) break;
    total++;
    if (state.logs[ds]?.[routineId]) done++;
  }
  return total > 0 ? { rate: Math.round(done / total * 100), done, total } : { rate: 0, done: 0, total: 0 };
}

function renderWeeklyCompare() {
  const active = state.routines.filter(r => r.active !== false);
  if (!active.length) return '';
  const thisW = getWeekRange(0), lastW = getWeekRange(1);

  const compared = active.map(r => {
    const tw = calcWeekRate(r.id, thisW.start, thisW.end);
    const lw = calcWeekRate(r.id, lastW.start, lastW.end);
    return { name: r.name, diff: tw.done - lw.done, twDone: tw.done, lwDone: lw.done };
  }).filter(x => x.twDone > 0 || x.lwDone > 0);

  if (!compared.length) return `<div class="weekly-cmp-card">
    <div style="font-size:13px;color:var(--text-dim);text-align:center;padding:8px 0">아직 이번 주 데이터가 없어요</div>
  </div>`;

  const totalThis = compared.reduce((s,x)=>s+x.twDone,0);
  const totalLast = compared.reduce((s,x)=>s+x.lwDone,0);
  const diffTotal = totalThis - totalLast;

  const emoji = diffTotal > 0 ? '🎉' : diffTotal < 0 ? '😅' : '😊';
  const summaryColor = diffTotal > 0 ? '#43e97b' : diffTotal < 0 ? '#e63946' : 'var(--gold)';

  const improved = compared.filter(x => x.diff > 0).map(x => x.name);

function calcMonthRate(routineId, year, month) {
  const daysInMonth = new Date(year, month, 0).getDate();
  const todayStr = today();
  let done = 0, total = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if (ds > todayStr) break;
    total++;
    if (state.logs[ds]?.[routineId]) done++;
  }
  return { done, total };
}

function getCurrentStreak(){
  const ar=state.routines.filter(r=>r.active!==false); if(!ar.length)return 0;
  let s=0; const d=new Date();
  while(true){
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const log=state.logs[k]||{};
    const done=ar.filter(r=>log[r.id]).length;
    if(done===0&&k<today())break;
    if(done>0)s++;else break;
    d.setDate(d.getDate()-1);
  }
  return s;
}
function getBestStreak(){
  const ar=state.routines.filter(r=>r.active!==false); if(!ar.length)return 0;
  let best=0,cur=0;
  Object.keys(state.logs).sort().forEach(k=>{
    if(ar.filter(r=>state.logs[k][r.id]).length>0){cur++;best=Math.max(best,cur);}else cur=0;
  });
  return best;
}

function _initRoutineDrag() {
  const list = document.getElementById('manage-list');
  let dragSrc = null, touchDragEl = null, touchClone = null, touchStartY = 0;

  list.querySelectorAll('.routine-manage-card').forEach(card => {
    const handle = card.querySelector('.drag-handle');
    if (!handle) return;

    // Desktop drag
    handle.addEventListener('mousedown', () => { card.draggable = true; });
    card.addEventListener('dragstart', e => {
      dragSrc = card;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.draggable = false;
      card.classList.remove('dragging');
      list.querySelectorAll('.routine-manage-card').forEach(c => c.classList.remove('drag-over'));
      _saveRoutineOrder();
    });
    card.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
    card.addEventListener('dragenter', e => { e.preventDefault(); if (card !== dragSrc) card.classList.add('drag-over'); });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', e => {
      e.preventDefault();
      if (dragSrc && dragSrc !== card) {
        const cards = [...list.querySelectorAll('.routine-manage-card')];
        const si = cards.indexOf(dragSrc), ti = cards.indexOf(card);
        if (si < ti) card.after(dragSrc); else card.before(dragSrc);
      }
      card.classList.remove('drag-over');
    });

    // Touch drag
    handle.addEventListener('touchstart', e => {
      const touch = e.touches[0];
      touchDragEl = card;
      touchStartY = touch.clientY;
      touchClone = card.cloneNode(true);
      touchClone.style.cssText = `position:fixed;left:${card.getBoundingClientRect().left}px;top:${card.getBoundingClientRect().top}px;width:${card.offsetWidth}px;opacity:0.85;z-index:999;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,0.4);`;
      document.body.appendChild(touchClone);
      card.classList.add('dragging');
    }, {passive: true});

    handle.addEventListener('touchmove', e => {
      if (!touchDragEl) return;
      e.preventDefault();
      const touch = e.touches[0];
      const dy = touch.clientY - touchStartY;
      touchClone.style.top = (touchDragEl.getBoundingClientRect().top + dy) + 'px';
      const target = document.elementFromPoint(touch.clientX, touch.clientY)?.closest('.routine-manage-card');
      list.querySelectorAll('.routine-manage-card').forEach(c => c.classList.remove('drag-over'));
      if (target && target !== touchDragEl) target.classList.add('drag-over');
    }, {passive: false});

    handle.addEventListener('touchend', e => {
      if (!touchDragEl) return;
      const touch = e.changedTouches[0];
      const target = document.elementFromPoint(touch.clientX, touch.clientY)?.closest('.routine-manage-card');
      if (target && target !== touchDragEl) {
        const cards = [...list.querySelectorAll('.routine-manage-card')];
        const si = cards.indexOf(touchDragEl), ti = cards.indexOf(target);
        if (si < ti) target.after(touchDragEl); else target.before(touchDragEl);
      }
      touchDragEl.classList.remove('dragging');
      list.querySelectorAll('.routine-manage-card').forEach(c => c.classList.remove('drag-over'));
      touchClone.remove();
      touchDragEl = null; touchClone = null;
      _saveRoutineOrder();
    });
  });
}

function _saveRoutineOrder() {
  const ids = [...document.querySelectorAll('#manage-list .routine-manage-card')].map(el => el.dataset.id);
  state.routines.sort((a, b) => ids.indexOf(a.id) - ids.indexOf(b.id));

  renderToday();
}

let failTargetDate = null;

  ).join('');

function selectFailReason(reasonId) {
  const routineId = document.getElementById('fail-routine-id').value;
  const date = failTargetDate || today();

// ── HISTORY CALENDAR ─────────────────────────────
let _historyCtx = null;
function openHistoryModal(type, id, name) {
  _historyCtx = {type, id, name};
  document.getElementById('history-modal-title').textContent = name;
  _renderHistoryCal();
  openModal('history-modal');
}
function _renderHistoryCal() {
  const {type, id} = _historyCtx;
  const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const DAY_LABELS = ['일','월','화','수','목','금','토'];
  const todayStr = today();
  const [ty,tm] = todayStr.split('-').map(Number);
  let html = '';
  for (let mo = 2; mo >= 0; mo--) {
    let y = ty, m = tm - mo;
    if (m <= 0) { m += 12; y--; }
    const firstDay = new Date(y, m-1, 1).getDay();
    const daysInMonth = new Date(y, m, 0).getDate();
    html += `<div class="history-month-label">${y}년 ${MN[m-1]}</div>`;
    html += `<div class="history-cal-grid">`;
    html += DAY_LABELS.map(d=>`<div class="history-cal-label">${d}</div>`).join('');
    for (let i=0; i<firstDay; i++) html += `<div class="history-cal-day empty"></div>`;
    for (let d=1; d<=daysInMonth; d++) {
      const ds = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isFuture = ds > todayStr;
      const isDone = type==='routine' ? !!(state.logs[ds]?.[id]) : !!(state.challengeLogs[id]?.[ds]);
      const isToday = ds === todayStr;
      let cls = 'history-cal-day';
      if (isDone) cls += ' done';
      if (isToday) cls += ' today-mark';
      if (isFuture) cls += ' empty';
      const click = (!isFuture && type==='routine') ? `onclick="toggleHistoryDay('${ds}')"` : '';
      const style = (!isFuture && type==='routine') ? 'style="cursor:pointer"' : '';
      html += `<div class="${cls}" ${click} ${style}>${isFuture?'':d}</div>`;
    }
    html += `</div>`;
  }
  const totalDone = type==='routine'
    ? Object.values(state.logs).filter(log=>log[id]).length
    : Object.values(state.challengeLogs[id]||{}).filter(Boolean).length;
  document.getElementById('history-modal-sub').textContent = `총 ${totalDone}회 완료`;
  document.getElementById('history-cal-body').innerHTML = html;
}
function toggleHistoryDay(ds) {
  const {id} = _historyCtx;
  if (!state.logs[ds]) state.logs[ds] = {};
  state.logs[ds][id] = !state.logs[ds][id];
  if (!state.logs[ds][id]) delete state.logs[ds][id];
  save();
  _renderHistoryCal();
  if (ds === today()) renderToday();
}

// long-press 유틸
let _lpTimer = null;
function addLongPress(el, cb) {
  const start = (e) => {
    _lpTimer = setTimeout(() => { _lpTimer=null; cb(e); }, 500);
  };
  const cancel = () => { if(_lpTimer){clearTimeout(_lpTimer);_lpTimer=null;} };
  el.addEventListener('touchstart', start, {passive:true});
  el.addEventListener('touchend', cancel);
  el.addEventListener('touchmove', cancel);
  el.addEventListener('mousedown', start);
  el.addEventListener('mouseup', cancel);
  el.addEventListener('mouseleave', cancel);
}

  const routineId = document.getElementById('fail-routine-id').value;

  save();

}

// ── DAY DETAIL ────────────────────────────────────
function togglePastRoutine(routineId, dateStr) {
  if (!state.logs[dateStr]) state.logs[dateStr] = {};
  const wasDone = state.logs[dateStr][routineId];
  state.logs[dateStr][routineId] = !wasDone;

  // 완료로 바꾸면 실패 이유 삭제
  if (!wasDone && state.failLogs[dateStr]) {
    delete state.failLogs[dateStr][routineId];
  }

  recalcStats();
  checkTitleUnlock();
  save();
  openDayDetail(dateStr);
  if (dateStr === today()) renderToday();
  renderChar();
  renderCalendar();
  renderMonthReport();
  renderBreakdown();
}

function openDayDetail(dateStr) {
  const d = new Date(dateStr+'T00:00:00');
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('day-detail-title').textContent =
    `${d.getMonth()+1}월 ${d.getDate()}일 ${days[d.getDay()]}요일`;

  const log = state.logs[dateStr] || {};
  const fl  = state.failLogs[dateStr] || {};
  const ar  = state.routines.filter(r => r.active !== false);
  const isToday = dateStr === today();

  const html = ar.map(r => {
    const done = log[r.id];
    const fr = fl[r.id] ? FAIL_REASONS.find(x => x.id === fl[r.id]) : null;
    return `<div class="day-detail-row ${done?'done':''}">
      <div class="check-circle" style="width:22px;height:22px;font-size:12px;flex-shrink:0;cursor:pointer" onclick="togglePastRoutine('${r.id}','${dateStr}')">${done?'✓':''}</div>
      <div style="flex:1;min-width:0" onclick="togglePastRoutine('${r.id}','${dateStr}')" style="cursor:pointer">
        <div style="font-size:14px;${done?'text-decoration:line-through;color:var(--text-dim)':''}">${r.name}</div>
        ${fr?`<div class="fail-tag">${fr.emoji} ${fr.label}</div>`:''}
      </div>
      ${!done?`<button class="fail-btn" onclick="openFailModal('${r.id}',null,'${dateStr}')">📝</button>`:''}
    </div>`;
  }).join('');

  document.getElementById('day-detail-list').innerHTML = html || '<div class="empty-state">루틴이 없어요</div>';
  openModal('day-detail-modal');
}

function toggleRoutineActive(id){

let cDur=7,cChalType='period';
function _resetChalTypeUI(type){
  cChalType=type;
  document.querySelectorAll('#chal-type-select .select-btn').forEach(b=>b.classList.toggle('selected',b.dataset.val===type));
  document.getElementById('chal-period-section').style.display=type==='period'?'':'none';

}
function openAddChallenge(){
  document.getElementById('challenge-modal-title').textContent='챌린지 추가';
  document.getElementById('edit-challenge-id').value='';
  document.getElementById('challenge-name-input').value='';
  document.getElementById('delete-challenge-btn').style.display='none';
  cDur=7;document.querySelectorAll('#duration-select .select-btn').forEach((b,i)=>b.classList.toggle('selected',i===0));
  document.getElementById('challenge-count-input').value='10';
  _resetChalTypeUI('period');
  openModal('challenge-modal');
}
function editChallenge(id){
  const c=state.challenges.find(x=>x.id===id);if(!c)return;
  document.getElementById('challenge-modal-title').textContent='챌린지 수정';
  document.getElementById('edit-challenge-id').value=id;
  document.getElementById('challenge-name-input').value=c.name;
  document.getElementById('delete-challenge-btn').style.display='';
  _resetChalTypeUI(c.type||'period');
  if(c.type==='count'){
    document.getElementById('challenge-count-input').value=c.targetCount||10;
  } else {
    cDur=c.duration;document.querySelectorAll('#duration-select .select-btn').forEach(b=>b.classList.toggle('selected',parseInt(b.dataset.val)===cDur));
  }
  openModal('challenge-modal');
}
function selectDuration(b){document.querySelectorAll('#duration-select .select-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');cDur=parseInt(b.dataset.val);}
function selectChalType(b){
  document.querySelectorAll('#chal-type-select .select-btn').forEach(x=>x.classList.remove('selected'));
  b.classList.add('selected');cChalType=b.dataset.val;
  document.getElementById('chal-period-section').style.display=cChalType==='period'?'':'none';
  document.getElementById('chal-count-section').style.display=cChalType==='count'?'':'none';
}
function saveChallenge(){
  const name=document.getElementById('challenge-name-input').value.trim();
  if(!name){showToast('이름을 입력해주세요');return;}
  const eid=document.getElementById('edit-challenge-id').value;
  const isCount=cChalType==='count';
  const targetCount=isCount?Math.max(1,parseInt(document.getElementById('challenge-count-input').value)||10):null;
  if(eid){
    const c=state.challenges.find(x=>x.id===eid);
    if(c){c.name=name;c.type=cChalType;if(isCount){c.targetCount=targetCount;delete c.duration;}else{c.duration=cDur;delete c.targetCount;}}
  } else {
    const nid='c'+Date.now();
    const obj={id:nid,name,type:cChalType,startDate:today()};
    if(isCount) obj.targetCount=targetCount; else obj.duration=cDur;
    state.challenges.push(obj);state.challengeLogs[nid]={};
  }
  save();closeModal('challenge-modal');renderManage();renderToday();
  showToast(eid?'챌린지가 수정됐어요':'챌린지가 시작됐어요! ⚡');
}
function deleteCurrentChallenge(){
  const id=document.getElementById('edit-challenge-id').value;
  if(!id||!confirm('챌린지를 삭제할까요?'))return;
  state.challenges=state.challenges.filter(c=>c.id!==id);
  save();closeModal('challenge-modal');renderManage();renderToday();showToast('챌린지가 삭제됐어요');
}
function isChallengeActive(c){
  if(c.type==='count'){const cl=state.challengeLogs[c.id]||{};return Object.values(cl).filter(Boolean).length<c.targetCount;}
  const e=new Date(c.startDate);e.setDate(e.getDate()+c.duration);return new Date()<e;
}
function getDaysElapsed(s){return Math.floor((new Date()-new Date(s))/86400000);}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
